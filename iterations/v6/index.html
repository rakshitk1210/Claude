<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude — v6 Board Canvas</title>
  <style>
    @font-face {
      font-family: 'Tiempos Headline';
      src: url('../../Test Tiempos Headline/test-tiempos-headline-light.woff2') format('woff2');
      font-weight: 300; font-style: normal;
    }
    @font-face {
      font-family: 'Tiempos Headline';
      src: url('../../Test Tiempos Headline/test-tiempos-headline-regular.woff2') format('woff2');
      font-weight: 400; font-style: normal;
    }
    @font-face {
      font-family: 'Tiempos Headline';
      src: url('../../Test Tiempos Headline/test-tiempos-headline-medium.woff2') format('woff2');
      font-weight: 500; font-style: normal;
    }
    @font-face {
      font-family: 'Tiempos Headline';
      src: url('../../Test Tiempos Headline/test-tiempos-headline-semibold.woff2') format('woff2');
      font-weight: 600; font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-sidebar: #1c1917;
      --bg-main:    #f5f4ef;
      --bg-input:   #eceae3;
      --bg-human:   #e8e6df;
      --text-100:   #1c1917;
      --text-300:   #6b6860;
      --text-400:   #9b9892;
      --text-500:   #b5b2ab;
      --accent:     #c15f3c;
      --border:     #e4e2dc;
      --sel-bg:     #b2dafd;
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
      background: var(--bg-main); color: var(--text-100);
    }

    /* ─── App shell ──────────────────────────────────────────── */
    .app { display: flex; height: 100vh; }

    /* ─── Sidebar ────────────────────────────────────────────── */
    .sidebar {
      width: 48px; background: var(--bg-sidebar);
      display: flex; flex-direction: column; align-items: center;
      padding: 8px 0 10px; flex-shrink: 0; z-index: 20;
    }
    .sidebar-top  { display: flex; flex-direction: column; align-items: center; gap: 1px; flex: 1; }
    .sidebar-bottom { display: flex; flex-direction: column; align-items: center; }
    .sb-btn {
      width: 36px; height: 36px; border-radius: 8px; border: none;
      background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #9b9892; transition: background 120ms, color 120ms;
    }
    .sb-btn:hover  { background: rgba(255,255,255,.08); color: #f5f4ef; }
    .sb-btn.active { color: rgba(255,255,255,.85); }
    .sb-divider { width: 22px; height: 1px; background: rgba(255,255,255,.07); margin: 5px 0; }
    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 10.5px; font-weight: 600; color: white; cursor: pointer; letter-spacing: .03em;
    }

    /* ─── Main wrap ──────────────────────────────────────────── */
    .main-wrap { flex: 1; position: relative; overflow: hidden; }

    /* ─── Home screen ────────────────────────────────────────── */
    #home-screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: var(--bg-main);
      transition: opacity 280ms ease, transform 280ms ease;
    }
    #home-screen.hiding {
      opacity: 0; transform: translateY(-10px); pointer-events: none;
    }

    .greeting-row {
      display: flex; align-items: center; gap: 14px; margin-bottom: 22px;
    }
    .greeting-logo { width: 44px; height: 44px; color: var(--accent); flex-shrink: 0; }
    .greeting-text {
      font-family: 'Tiempos Headline', Georgia, serif;
      font-size: 36px; font-weight: 300; color: var(--text-100);
    }

    /* Home input */
    .home-input-wrap {
      width: 600px; max-width: calc(100vw - 96px);
      background: var(--bg-input); border-radius: 16px;
      padding: 12px 12px 10px 16px;
      display: flex; flex-direction: column; gap: 8px;
      transition: box-shadow 150ms;
    }
    .home-input-wrap:focus-within { box-shadow: 0 0 0 1.5px rgba(0,0,0,.13); }

    .home-field {
      width: 100%; border: none; background: transparent;
      font-size: 15px; font-family: inherit; color: var(--text-100);
      resize: none; outline: none; line-height: 1.5;
      min-height: 24px; max-height: 140px;
    }
    .home-field::placeholder { color: var(--text-400); }

    .home-tb { display: flex; align-items: center; justify-content: space-between; }

    .home-disclaimer {
      text-align: center; font-size: 11px; color: var(--text-500); margin-top: 8px;
    }

    /* Shared toolbar pieces */
    .tb-left  { display: flex; align-items: center; gap: 4px; }
    .tb-right { display: flex; align-items: center; gap: 4px; }

    .mode-pills { display: flex; align-items: center; gap: 2px; }
    .mode-pill {
      height: 28px; padding: 0 12px; border-radius: 100px; border: none;
      font-size: 12.5px; font-weight: 500; cursor: pointer;
      background: transparent; color: var(--text-400); font-family: inherit;
      transition: background 150ms, color 150ms;
    }
    .mode-pill.active { background: var(--accent); color: white; }
    .mode-pill:not(.active):hover { background: rgba(0,0,0,.06); color: var(--text-100); }

    .tool-btn {
      height: 28px; padding: 0 8px; border: none; border-radius: 7px;
      background: transparent; cursor: pointer; display: flex; align-items: center; gap: 4px;
      color: var(--text-400); font-size: 12.5px; font-weight: 500; font-family: inherit;
      transition: background 100ms, color 100ms;
    }
    .tool-btn:hover { background: rgba(0,0,0,.06); color: var(--text-100); }

    .model-btn {
      height: 28px; padding: 0 8px; border: none; border-radius: 7px;
      background: transparent; cursor: pointer; display: flex; align-items: center; gap: 3px;
      color: var(--text-400); font-size: 12.5px; font-weight: 500; font-family: inherit;
      transition: background 100ms, color 100ms;
    }
    .model-btn:hover { background: rgba(0,0,0,.06); color: var(--text-100); }

    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #2db57e; }

    .send-btn {
      width: 30px; height: 30px; border-radius: 50%; background: var(--text-100);
      border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: white; transition: background 100ms, transform 80ms;
    }
    .send-btn:hover:not(:disabled) { background: #333; }
    .send-btn:active:not(:disabled) { transform: scale(.92); }
    .send-btn:disabled { background: #c8c5be; cursor: not-allowed; }

    /* ─── Board screen ───────────────────────────────────────── */
    #board-screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none;
      transition: opacity 300ms ease;
    }
    #board-screen.visible { opacity: 1; pointer-events: auto; }

    /* Topbar */
    #board-topbar {
      height: 48px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid rgba(0,0,0,.08);
      background: var(--bg-main);
      z-index: 10; position: relative;
    }

    .board-title-btn {
      display: flex; align-items: center; gap: 5px;
      font-size: 14px; font-weight: 500; color: var(--text-100);
      border: none; background: transparent; cursor: pointer; font-family: inherit;
      border-radius: 6px; padding: 4px 8px; margin-left: -8px;
      transition: background 100ms;
    }
    .board-title-btn:hover { background: rgba(0,0,0,.05); }

    .exit-board-btn {
      display: flex; align-items: center; gap: 7px;
      height: 32px; padding: 0 14px; border-radius: 100px;
      border: 1px solid var(--border); background: white;
      font-size: 12.5px; font-weight: 500; color: var(--text-300); cursor: pointer;
      font-family: inherit; transition: background 100ms, color 100ms;
    }
    .exit-board-btn:hover { background: var(--bg-main); color: var(--text-100); }

    /* Board canvas */
    #board-canvas {
      flex: 1; overflow-x: auto; overflow-y: auto;
      background: var(--bg-main);
      background-image: radial-gradient(circle, #cac7c0 1px, transparent 1px);
      background-size: 24px 24px;
      padding: 28px 48px 120px;
    }
    #board-canvas::-webkit-scrollbar { width: 5px; height: 6px; }
    #board-canvas::-webkit-scrollbar-thumb { background: rgba(0,0,0,.1); border-radius: 3px; }

    /* Versions container */
    #versions-container {
      display: flex; gap: 20px; align-items: flex-start;
      min-width: max-content;
    }

    /* Version column */
    .ver-col {
      display: flex; flex-direction: column;
      width: 440px; flex-shrink: 0;
    }

    /* Column header */
    .ver-header {
      flex-shrink: 0; margin-bottom: 14px;
      min-height: 68px;
      display: flex; flex-direction: column; justify-content: flex-end;
    }

    /* Human bubble in col 1 */
    .human-bubble {
      background: var(--bg-human); border-radius: 14px 14px 14px 4px;
      padding: 10px 15px; font-size: 14px; line-height: 1.55;
      max-width: 380px; color: var(--text-100); word-break: break-word;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
    }

    /* Context block in col 2+ */
    .ctx-block {
      background: white; border-radius: 10px;
      padding: 10px 13px; display: flex; flex-direction: column; gap: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
      border: 1px solid var(--border);
    }
    .ctx-question {
      font-size: 13px; color: var(--text-100); line-height: 1.45; font-weight: 400;
    }
    .ctx-quote {
      display: flex; overflow: hidden; border-radius: 0 5px 5px 0;
    }
    .ctx-quote-bar { width: 3px; background: #74b9f5; flex-shrink: 0; border-radius: 2px; }
    .ctx-quote-text {
      padding: 5px 10px;
      font-size: 12px; font-style: italic; line-height: 1.5;
      color: var(--text-400); background: rgba(178,218,253,.15);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Version card */
    .ver-card {
      background: white; border-radius: 14px;
      padding: 24px 26px 28px;
      overflow: visible;
      box-shadow: 0 2px 10px rgba(0,0,0,.07), 0 0 0 1px rgba(0,0,0,.04);
      position: relative;
      min-height: 480px;
    }

    .ver-card-label {
      font-family: 'Tiempos Headline', Georgia, serif;
      font-size: 28px; font-weight: 300; color: var(--text-100);
      margin-bottom: 18px; line-height: 1.2;
    }
    .ver-doc-title {
      font-size: 13.5px; font-weight: 600; color: var(--text-300);
      margin-bottom: 3px; line-height: 1.45;
    }
    .ver-doc-subtitle {
      font-size: 13px; color: var(--text-400);
      margin-bottom: 18px; line-height: 1.5;
    }
    .ver-divider {
      border: none; border-top: 1px solid var(--border); margin: 0 0 20px;
    }
    .ver-body {
      font-family: 'Tiempos Headline', Georgia, serif;
      font-size: 15.5px; font-weight: 400; line-height: 1.82; color: var(--text-100);
      outline: none;
    }
    .ver-body p + p { margin-top: 14px; }
    .ver-body ::selection    { background: var(--sel-bg); }
    .ver-body ::-moz-selection { background: var(--sel-bg); }

    /* Skeleton */
    .skeleton-wrap { display: flex; flex-direction: column; gap: 11px; }
    .skeleton-line {
      height: 16px; border-radius: 7px;
      background: linear-gradient(90deg, #f0eeea 25%, #e8e6e0 50%, #f0eeea 75%);
      background-size: 200% 100%; animation: shimmer 1.4s ease infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* Streaming cursor */
    .stream-cursor {
      display: inline-block; width: 2px; height: 14px; background: var(--text-300);
      border-radius: 1px; vertical-align: text-bottom; margin-left: 1px;
      animation: blink .85s ease infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ─── Fixed board bottom input ───────────────────────────── */
    #board-input {
      position: fixed; bottom: 20px;
      left: 50%; transform: translateX(calc(-50% + 24px));
      width: 540px;
      background: var(--bg-input); border-radius: 14px;
      padding: 10px 10px 8px 14px;
      display: none; flex-direction: column; gap: 6px;
      box-shadow: 0 2px 16px rgba(0,0,0,.12), 0 0 0 1px rgba(0,0,0,.06);
      z-index: 50;
      transition: box-shadow 150ms;
    }
    #board-input.visible { display: flex; }
    #board-input:focus-within { box-shadow: 0 2px 16px rgba(0,0,0,.14), 0 0 0 1.5px rgba(0,0,0,.14); }

    #board-field {
      width: 100%; border: none; background: transparent;
      font-size: 14.5px; font-family: inherit; color: var(--text-100);
      resize: none; outline: none; line-height: 1.5;
      min-height: 22px; max-height: 120px;
    }
    #board-field::placeholder { color: var(--text-400); }

    .board-tb { display: flex; align-items: center; justify-content: space-between; }

    /* ─── Selection toolbar ──────────────────────────────────── */
    #selection-toolbar {
      position: fixed; z-index: 200;
      background: white; border: 1px solid #e4e2dc;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.07);
      display: none; align-items: center; gap: 4px; padding: 5px 7px;
      pointer-events: all; white-space: nowrap; user-select: none;
    }
    #selection-toolbar.visible { display: flex; }

    .ft-divider { width: 1px; height: 18px; background: #e4e2dc; margin: 0 2px; }
    .ft-icon-btn {
      width: 28px; height: 28px; border-radius: 7px; border: none; background: transparent;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-300); transition: background 100ms, color 100ms;
    }
    .ft-icon-btn:hover { background: rgba(0,0,0,.05); color: var(--text-100); }
    .ft-btn {
      height: 28px; padding: 0 11px; border-radius: 7px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 4px; font-family: inherit;
      transition: background 100ms, color 100ms; border: none;
    }
    .ft-btn-ghost { border: 1px solid #e0ddd7; background: white; color: var(--text-100); }
    .ft-btn-ghost:hover { background: var(--bg-main); }
    .ft-btn-primary { background: var(--accent); color: white; }
    .ft-btn-primary:hover { background: #b05535; }

    /* ─── Inline ask card ────────────────────────────────────── */
    #inline-card {
      position: fixed; z-index: 210;
      background: white; border: 1px solid #e4e2dc;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.09), 0 12px 32px rgba(0,0,0,.08);
      display: none; flex-direction: column; gap: 10px;
      padding: 12px 12px 10px 14px;
      width: 380px; pointer-events: all;
    }
    #inline-card.visible { display: flex; }

    .ic-ctx {
      font-size: 11.5px; color: var(--text-400); font-style: italic;
      padding: 5px 10px;
      background: rgba(178,218,253,.2);
      border-left: 2px solid #74b9f5; border-radius: 0 4px 4px 0;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .ic-textarea {
      width: 100%; border: none; background: transparent;
      font-size: 14px; font-family: inherit; color: var(--text-100);
      resize: none; outline: none; line-height: 1.5;
      min-height: 20px; max-height: 100px;
    }
    .ic-textarea::placeholder { color: var(--text-400); }
    .ic-footer { display: flex; align-items: center; justify-content: space-between; }
    .ic-close {
      width: 28px; height: 28px; border-radius: 7px; border: none; background: transparent;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-400); transition: background 100ms, color 100ms;
    }
    .ic-close:hover { background: rgba(0,0,0,.05); color: var(--text-100); }
    .ic-send {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: white; transition: background 80ms, transform 80ms;
    }
    .ic-send:hover { background: #b05535; }
    .ic-send:active { transform: scale(.92); }
    .ic-send:disabled { background: #c8c5be; cursor: not-allowed; }
  </style>
</head>
<body>
<div class="app" id="app">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <button class="sb-btn active">

      <div class="sb-divider"></div>
      <button class="sb-btn">
        <svg width="18" height="18" viewBox="0 0 256 256" fill="currentColor"><path d="M239.2,97.29a15.89,15.89,0,0,0-13-10.78l-59.06-4.92L144.27,26.8a15.91,15.91,0,0,0-29.3,0L92.86,81.59,33.8,86.51A15.89,15.89,0,0,0,20.8,97.29,16.46,16.46,0,0,0,25.95,115l45,38.83L57.17,211.8a16.38,16.38,0,0,0,6.86,17.67,15.84,15.84,0,0,0,18.62-.8L128,193.38l45.35,35.29a15.86,15.86,0,0,0,18.62.8,16.38,16.38,0,0,0,6.86-17.67l-13.78-58-45-38.83A16.46,16.46,0,0,0,239.2,97.29Z"/></svg>
      </button>
    </div>
    <div class="sidebar-bottom">
      <div class="user-avatar">RK</div>
    </div>
  </aside>

  <!-- ── Main wrap ── -->
  <div class="main-wrap">

    <!-- ── Home screen ── -->
    <div id="home-screen">
      <div class="greeting-row">
        <svg class="greeting-logo" viewBox="0 0 100 100" fill="currentColor">

<script>
  // ── Content pools ──────────────────────────────────────────────────────────
  const VERSION_VARIANTS = [
    {
      title: 'Reading Quiz: Interface Ethics, Deceptive Patterns, Dark Patterns, and Value-Sensitive Design',
      subtitle: 'First draft — cover letter',
      body: `<p>Dear Hiring Manager,</p><p>I am writing to express my interest in this role at Google. With my background in product design and human-computer interaction, I believe I would be a valuable addition to your team.</p><p>Throughout my career, I have focused on creating interfaces that respect users — systems that are transparent about their capabilities, honest about their limitations, and designed to support rather than manipulate user decision-making. This work has given me a deep appreciation for the ethical dimensions of design at scale.</p><p>At my current position, I led a redesign of our onboarding flow that eliminated several patterns we identified as coercive, resulting in higher long-term retention and significantly improved user satisfaction scores. I believe good design and ethical design are not in tension — they reinforce each other.</p><p>I am particularly drawn to Google's commitment to responsible AI development and would welcome the opportunity to contribute to products that touch billions of lives.</p><p>Thank you for your consideration. I would be glad to discuss how my experience aligns with what you are looking for.</p><p>Sincerely,<br>Rakshit</p>`,
    },
    {
      title: 'Reading Quiz: Interface Ethics, Deceptive Patterns, Dark Patterns, and Value-Sensitive Design',
      subtitle: 'Revised draft — second pass',
      body: `<p>Dear Hiring Manager,</p><p>I'm applying for this role because the problems Google works on — building systems that are both powerful and trustworthy — are the ones I've spent my career thinking about.</p><p>The most interesting design challenges I've encountered aren't about aesthetics or usability in the narrow sense. They're about what happens when you give users a system that's much more capable than they realize, or much more limited than it appears. Getting that communication right — being honest without being paralyzing — turns out to be quite hard, and quite important.</p><p>My recent work has been in AI-adjacent products where these questions come up constantly. How do you signal uncertainty without undermining confidence? How do you make it easy to stay in control without making every interaction feel like a liability waiver? I don't think there are clean answers, but I've developed some intuitions, and I'd like to keep developing them at a place that takes them seriously.</p><p>I've attached a portfolio of relevant work. Happy to discuss further.</p><p>Rakshit</p>`,
    },
    {
      title: 'Reading Quiz: Interface Ethics, Deceptive Patterns, Dark Patterns, and Value-Sensitive Design',
      subtitle: 'Sharper tone — third pass',
      body: `<p>The job description asks for someone who can "navigate ambiguity." I'd put it differently: I look for the places where ambiguity is hiding a real design decision that someone avoided making, and I try to make it.</p><p>My background is in interface ethics — specifically, how design choices shape user behavior in ways that users often don't notice and designers often don't intend. I've spent a lot of time on questions like: what does it mean for a system to be honest with users? When does reducing friction become manipulation? How do you design for informed consent at scale?</p><p>These aren't abstract concerns for me. I've worked on products with tens of millions of users where the wrong answer had real consequences. I've been in rooms where the business case for a dark pattern was compelling and argued against it anyway. Sometimes I won.</p><p>I'd like to do that work at Google, where the stakes are higher and the resources to do it well are actually available.</p>`,
    },
    {
      title: 'Reading Quiz: Interface Ethics, Deceptive Patterns, Dark Patterns, and Value-Sensitive Design',
      subtitle: 'Alternative direction — fourth pass',
      body: `<p>I want to work on the problems that Google is working on, and I want to work on them well.</p><p>That's a compressed version of a longer argument, which goes like this: the most consequential design decisions in the next decade will be about how AI systems present themselves to users — how they communicate confidence, how they handle failure, how they balance being helpful with being honest. Getting this wrong at scale would be bad. Getting it right is possible, but it requires both technical understanding and design judgment, and people who have both are rare.</p><p>I have spent the last several years developing exactly this combination. I understand the technical constraints well enough to know when a design requirement is actually achievable and when it's wishful thinking. I understand design well enough to know that "just show a confidence score" is almost never the right answer.</p><p>I would like to come in and show you what this looks like in practice. I'm available to start immediately.</p>`,
    },
  ];

  // ── State ──────────────────────────────────────────────────────────────────
  let isStreaming  = false;
  let boardActive  = false;
  let boardMode    = 'iterate';
  let homeMode     = 'ask';
  let versions     = [];
  let variantIdx   = 0;
  let selectedText = '';
  let activeCardEl = null;

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const homeScreen        = document.getElementById('home-screen');
  const boardScreen       = document.getElementById('board-screen');
  const homeField         = document.getElementById('home-field');
  const homeSendBtn       = document.getElementById('home-send-btn');
  const boardField        = document.getElementById('board-field');
  const boardSendBtn      = document.getElementById('board-send-btn');
  const boardInput        = document.getElementById('board-input');
  const versionsContainer = document.getElementById('versions-container');
  const boardTitleText    = document.getElementById('board-title-text');
  const boardCanvas       = document.getElementById('board-canvas');
  const selToolbar        = document.getElementById('selection-toolbar');
  const inlineCard        = document.getElementById('inline-card');
  const icCtxText         = document.getElementById('ic-ctx-text');
  const icTextarea        = document.getElementById('ic-textarea');
  const icSend            = document.getElementById('ic-send');

  // ── Home field ─────────────────────────────────────────────────────────────
  homeField.addEventListener('input', () => {
    homeField.style.height = 'auto';
    homeField.style.height = Math.min(homeField.scrollHeight, 140) + 'px';
    homeSendBtn.disabled = !homeField.value.trim() || isStreaming;
  });
  homeField.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!homeSendBtn.disabled) submitHome(); }
  });
  homeSendBtn.addEventListener('click', submitHome);

  // ── Board field ────────────────────────────────────────────────────────────
  boardField.addEventListener('input', () => {
    boardField.style.height = 'auto';
    boardField.style.height = Math.min(boardField.scrollHeight, 120) + 'px';
    boardSendBtn.disabled = !boardField.value.trim() || isStreaming;
  });
  boardField.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!boardSendBtn.disabled) submitBoard(); }
  });
  boardSendBtn.addEventListener('click', submitBoard);

  // ── Home mode pills ────────────────────────────────────────────────────────
  function setHomeMode(mode) {
    homeMode = mode;
    document.getElementById('home-pill-ask').classList.toggle('active', mode === 'ask');
    document.getElementById('home-pill-iterate').classList.toggle('active', mode === 'iterate');
    document.getElementById('home-model-name').textContent = mode === 'iterate' ? 'Haiku 4.5' : 'Opus 4.6';
  }

  // ── Board mode pills ───────────────────────────────────────────────────────
  function setBoardMode(mode) {
    boardMode = mode;
    document.getElementById('board-pill-ask').classList.toggle('active', mode === 'ask');
    document.getElementById('board-pill-iterate').classList.toggle('active', mode === 'iterate');
  }

  // ── Submit from home ───────────────────────────────────────────────────────
  function submitHome() {
    const text = homeField.value.trim();
    if (!text || isStreaming) return;

    boardTitleText.textContent = text.length > 44 ? text.slice(0, 44) + '\u2026' : text;
    homeField.value = '';
    homeField.style.height = 'auto';
    homeSendBtn.disabled = true;

    homeScreen.classList.add('hiding');
    setTimeout(() => {
      boardScreen.classList.add('visible');
      boardInput.classList.add('visible');
    }, 200);

    boardActive  = true;
    isStreaming  = true;

    appendVersionCol(text, null, null, () => {
      isStreaming = false;
      boardSendBtn.disabled = !boardField.value.trim();
    });
  }

  // ── Submit from board input ────────────────────────────────────────────────
  function submitBoard() {
    const text = boardField.value.trim();
    if (!text || isStreaming) return;

    boardField.value = '';
    boardField.style.height = 'auto';
    boardSendBtn.disabled = true;
    isStreaming = true;
    dismissInlineCard();
    dismissSelToolbar();

    appendVersionCol(null, text, null, () => {
      isStreaming = false;
      boardSendBtn.disabled = !boardField.value.trim();
    });
  }

  // ── Exit board ─────────────────────────────────────────────────────────────
  function exitBoard() {
    boardScreen.classList.remove('visible');
    boardInput.classList.remove('visible');
    homeScreen.classList.remove('hiding');
    boardActive = false;
    isStreaming = false;
    versions    = [];
    variantIdx  = 0;
    versionsContainer.innerHTML = '';
    dismissInlineCard();
    dismissSelToolbar();
    homeField.value = '';
    homeField.style.height = 'auto';
    homeSendBtn.disabled = true;
  }

  // ── Append a version column ────────────────────────────────────────────────
  function appendVersionCol(humanPrompt, question, quotedText, onDone) {
    const verNum = versions.length + 1;
    const id = 'ver-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
    versions.push({ id, num: verNum });

    const col = document.createElement('div');
    col.className = 'ver-col';
    col.dataset.id = id;

    // Header
    const header = document.createElement('div');
    header.className = 'ver-header';

    if (verNum === 1 && humanPrompt) {
      const bubble = document.createElement('div');
      bubble.className = 'human-bubble';
      bubble.textContent = humanPrompt;
      header.appendChild(bubble);
    } else if (question || quotedText) {
      const ctxBlock = document.createElement('div');
      ctxBlock.className = 'ctx-block';
      if (question) {
        const q = document.createElement('div');
        q.className = 'ctx-question';
        q.textContent = question;
        ctxBlock.appendChild(q);
      }
      if (quotedText) {
        const quote = document.createElement('div');
        quote.className = 'ctx-quote';
        quote.innerHTML = `<div class="ctx-quote-bar"></div><div class="ctx-quote-text">${esc(quotedText)}</div>`;
        ctxBlock.appendChild(quote);
      }
      header.appendChild(ctxBlock);
    }

    col.appendChild(header);

    // Card with skeleton
    const card = document.createElement('div');
    card.className = 'ver-card';
    card.dataset.id = id;
    card.innerHTML = `
      <div class="ver-card-label">Version ${verNum}</div>
      <div class="skeleton-wrap" style="margin-bottom:18px">
        <div class="skeleton-line" style="width:82%"></div>
        <div class="skeleton-line" style="width:64%"></div>
      </div>
      <div class="skeleton-wrap">
        <div class="skeleton-line" style="width:97%"></div>
        <div class="skeleton-line" style="width:90%"></div>
        <div class="skeleton-line" style="width:94%"></div>
        <div class="skeleton-line" style="width:85%"></div>
        <div class="skeleton-line" style="width:72%"></div>
      </div>
      <br>
      <div class="skeleton-wrap">
        <div class="skeleton-line" style="width:96%"></div>
        <div class="skeleton-line" style="width:88%"></div>
        <div class="skeleton-line" style="width:91%"></div>
        <div class="skeleton-line" style="width:79%"></div>
        <div class="skeleton-line" style="width:61%"></div>
      </div>
      <br>
      <div class="skeleton-wrap">
        <div class="skeleton-line" style="width:95%"></div>
        <div class="skeleton-line" style="width:83%"></div>
        <div class="skeleton-line" style="width:55%"></div>
      </div>`;

    col.appendChild(card);
    versionsContainer.appendChild(col);

    // Scroll to show new column
    setTimeout(() => {
      boardCanvas.scrollTo({ left: boardCanvas.scrollWidth, behavior: 'smooth' });
    }, 60);

    // Stream in content after delay
    setTimeout(() => {
      const variant = VERSION_VARIANTS[variantIdx++ % VERSION_VARIANTS.length];

      card.innerHTML = `
        <div class="ver-card-label">Version ${verNum}</div>
        <p class="ver-doc-title">${esc(variant.title)}</p>
        <p class="ver-doc-subtitle">${esc(variant.subtitle)}</p>
        <hr class="ver-divider">
        <div class="ver-body"></div>`;

      const body = card.querySelector('.ver-body');

      const cursor = document.createElement('span');
      cursor.className = 'stream-cursor';
      body.appendChild(cursor);

      streamInto(body, cursor, variant.body, () => {
        if (onDone) onDone(id);
      });
    }, 1100 + Math.random() * 600);
  }

  // ── Inline ask submission ──────────────────────────────────────────────────
  function submitInlineAsk() {
    const question = icTextarea.value.trim();
    if (!question || isStreaming) return;

    const quoted = selectedText;
    icTextarea.value = '';
    dismissInlineCard();
    dismissSelToolbar();

    isStreaming = true;
    boardSendBtn.disabled = true;

    appendVersionCol(null, question, quoted, () => {
      isStreaming = false;
      boardSendBtn.disabled = !boardField.value.trim();
    });
  }

  // ── Streaming helper ───────────────────────────────────────────────────────
  // cursor stays a direct child of container throughout so insertBefore never fails
  function streamInto(container, cursor, html, onDone) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;

    const srcParas = Array.from(tmp.querySelectorAll('p'));
    const chunks = [];

    if (srcParas.length > 0) {
      srcParas.forEach((srcP, i) => {
        if (i > 0) chunks.push(null); // paragraph break
        srcP.innerHTML.split(/(\s+)/).forEach(w => { if (w) chunks.push(w); });
      });
    } else {
      html.split(/(\s+)/).forEach(w => { if (w) chunks.push(w); });
    }

    let idx = 0;
    let currentP = null;

    function next() {
      if (idx >= chunks.length) {
        cursor.remove();
        if (onDone) onDone();
        return;
      }
      const ch = chunks[idx++];

      if (ch === null) {
        // paragraph break — reset currentP, small pause
        currentP = null;
        setTimeout(next, 55);
        return;
      }

      if (!currentP) {
        currentP = document.createElement('p');
        // cursor is always a direct child of container, so insertBefore is always valid
        container.insertBefore(currentP, cursor);
      }

      const span = document.createElement('span');
      span.innerHTML = ch;
      currentP.appendChild(span);

      setTimeout(next, 11 + Math.random() * 16);
    }

    next();
  }

  // ── Text selection on ver-body ─────────────────────────────────────────────
  // Single document-level listener avoids the e.currentTarget-goes-null-in-setTimeout bug
  let selTimeout;

  document.addEventListener('mouseup', e => {
    if (selToolbar.contains(e.target) || inlineCard.contains(e.target)) return;
    clearTimeout(selTimeout);
    selTimeout = setTimeout(checkAnyCardSelection, 30);
  });

  function checkAnyCardSelection() {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || sel.toString().trim().length < 2) {
      dismissSelToolbar(); return;
    }

    // Walk up from the anchor node to find a .ver-body ancestor
    let node = sel.anchorNode;
    if (!node) { dismissSelToolbar(); return; }
    const verBody = (node.nodeType === 3 ? node.parentElement : node)
      .closest?.('.ver-body');
    if (!verBody) { dismissSelToolbar(); return; }

    selectedText = sel.toString().trim();
    activeCardEl = verBody.closest('.ver-card');

    const range = sel.getRangeAt(0);
    const rect  = range.getBoundingClientRect();
    const tbW   = 252;
    let left = rect.left + (rect.width / 2) - (tbW / 2);
    let top  = rect.bottom + 10;
    left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
    if (top + 56 > window.innerHeight) top = rect.top - 52;

    selToolbar.style.left = left + 'px';
    selToolbar.style.top  = top  + 'px';
    selToolbar.classList.add('visible');
  }

  function dismissSelToolbar() {
    selToolbar.classList.remove('visible');
  }

  // Selection toolbar — Reply
  document.getElementById('st-reply').addEventListener('click', () => {
    if (selectedText) {
      boardField.value = selectedText.length > 120
        ? selectedText.slice(0, 120) + '\u2026'
        : selectedText;
      boardField.dispatchEvent(new Event('input'));
      boardField.focus();
    }
    dismissSelToolbar();
  });

  // Selection toolbar — Ask
  document.getElementById('st-ask').addEventListener('click', () => {
    dismissSelToolbar();
    openInlineCard();
  });

  // Dismiss toolbar when clicking outside (but only if selection has collapsed)
  document.addEventListener('mousedown', e => {
    if (selToolbar.contains(e.target) || inlineCard.contains(e.target)) return;
    // Small delay so the toolbar click event fires before dismiss
    setTimeout(() => {
      const sel = window.getSelection();
      if (!sel || sel.isCollapsed) dismissSelToolbar();
    }, 10);
  });

  // ── Inline card ────────────────────────────────────────────────────────────
  function openInlineCard() {
    if (!activeCardEl) return;
    icCtxText.textContent = selectedText;
    icTextarea.value = '';
    icSend.disabled  = true;

    // Position near the selection
    const sel = window.getSelection();
    const cardRect = activeCardEl.getBoundingClientRect();
    let top, left;

    if (sel && !sel.isCollapsed) {
      const range = sel.getRangeAt(0);
      const selRect = range.getBoundingClientRect();
      top  = selRect.bottom + 10;
      left = selRect.left;
    } else {
      top  = cardRect.top + 80;
      left = cardRect.left + 16;
    }

    const icW = Math.min(380, cardRect.width - 24);
    // Clamp to viewport
    if (left + icW > window.innerWidth - 8) left = window.innerWidth - icW - 8;
    if (left < 8) left = 8;
    if (top + 160 > window.innerHeight - 8) top = (sel && !sel.isCollapsed ? sel.getRangeAt(0).getBoundingClientRect().top : cardRect.top) - 170;

    inlineCard.style.left  = left + 'px';
    inlineCard.style.top   = top  + 'px';
    inlineCard.style.width = icW  + 'px';
    inlineCard.classList.add('visible');
    setTimeout(() => icTextarea.focus(), 50);
  }

  function dismissInlineCard() {
    inlineCard.classList.remove('visible');
    icTextarea.value = '';
    icSend.disabled  = true;
  }

  icTextarea.addEventListener('input', () => {
    icTextarea.style.height = 'auto';
    icTextarea.style.height = Math.min(icTextarea.scrollHeight, 100) + 'px';
    icSend.disabled = !icTextarea.value.trim();
  });
  icTextarea.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!icSend.disabled) submitInlineAsk(); }
  });
  icSend.addEventListener('click', submitInlineAsk);

  // ── Utility ────────────────────────────────────────────────────────────────
  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }
</script>
</body>
</html>
