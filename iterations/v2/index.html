<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude — v2 Inline Ask</title>
  <style>
    @font-face {
      font-family: 'Tiempos Headline';
      src: url('../../Test Tiempos Headline/test-tiempos-headline-light.woff2') format('woff2');
      font-weight: 300; font-style: normal;
    }
    @font-face {
      font-family: 'Tiempos Headline';
      src: url('../../Test Tiempos Headline/test-tiempos-headline-regular.woff2') format('woff2');
      font-weight: 400; font-style: normal;
    }
    @font-face {
      font-family: 'Tiempos Headline';
      src: url('../../Test Tiempos Headline/test-tiempos-headline-medium.woff2') format('woff2');
      font-weight: 500; font-style: normal;
    }
    @font-face {
      font-family: 'Tiempos Headline';
      src: url('../../Test Tiempos Headline/test-tiempos-headline-semibold.woff2') format('woff2');
      font-weight: 600; font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-w: 54px;
      --bg-sidebar: #1c1917;
      --bg-main: #f5f4ef;
      --bg-input: #eceae3;
      --bg-human: #e8e6df;
      --text-100: #1c1917;
      --text-300: #6b6860;
      --text-400: #9b9892;
      --text-500: #b5b2ab;
      --accent: #c15f3c;
      --border: #e4e2dc;
      --icon-default: #9b9892;
      --icon-hover: #f5f4ef;

      /* Selection highlight — matches Figma exactly */
      --selection-bg: #b2dafd;
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
      background: var(--bg-main);
      color: var(--text-100);
    }

    /* ── App Shell ── */
    .app { display: flex; height: 100vh; }

    /* ── Sidebar (unchanged from v1) ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--bg-sidebar);
      display: flex; flex-direction: column;
      align-items: center;
      padding: 8px 0 10px;
      flex-shrink: 0;
    }
    .sidebar-top { display: flex; flex-direction: column; align-items: center; gap: 1px; flex: 1; }
    .sidebar-bottom { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .sb-btn {
      width: 36px; height: 36px; border-radius: 8px; border: none;
      background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--icon-default);
      transition: background 120ms, color 120ms;
    }
    .sb-btn:hover { background: rgba(255,255,255,0.08); color: var(--icon-hover); }
    .sb-btn.active { color: rgba(255,255,255,0.85); }
    .sb-divider { width: 22px; height: 1px; background: rgba(255,255,255,0.07); margin: 5px 0; }
    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 10.5px; font-weight: 600; color: white;
      cursor: pointer; letter-spacing: 0.03em;
    }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* ── Topbar ── */
    .topbar {
      height: 46px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; border-bottom: 1px solid var(--border);
      flex-shrink: 0; background: var(--bg-main);
    }
    .topbar-title {
      display: flex; align-items: center; gap: 5px;
      font-size: 14px; font-weight: 500; color: var(--text-100);
      cursor: pointer; border-radius: 6px; padding: 4px 6px; margin-left: -6px;
      transition: background 100ms;
    }
    .topbar-title:hover { background: rgba(0,0,0,0.05); }
    .topbar-title svg { color: var(--text-400); }
    .share-btn {
      height: 29px; padding: 0 12px;
      border: 1px solid var(--border); border-radius: 8px; background: white;
      font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text-100);
      transition: background 100ms; display: flex; align-items: center; gap: 5px;
      font-family: inherit;
    }
    .share-btn:hover { background: var(--bg-input); }

    /* ── Messages ── */
    .messages-wrap { flex: 1; overflow-y: auto; scroll-behavior: smooth; position: relative; }
    .messages-wrap::-webkit-scrollbar { width: 5px; }
    .messages-wrap::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }

    .messages-inner {
      max-width: 688px; margin: 0 auto;
      padding: 36px 24px 24px;
      display: flex; flex-direction: column; gap: 28px;
    }

    /* Human message */
    .msg-human { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .human-bubble {
      background: var(--bg-human); border-radius: 18px 18px 4px 18px;
      padding: 10px 15px; font-size: 15px; line-height: 1.55;
      max-width: 78%; color: var(--text-100); word-break: break-word;
    }
    .human-meta { display: flex; align-items: center; gap: 10px; padding-right: 2px; }
    .meta-time { font-size: 11px; color: var(--text-400); }
    .action-row { display: flex; align-items: center; gap: 1px; opacity: 0; transition: opacity 140ms; }
    .msg-human:hover .action-row { opacity: 1; }
    .msg-claude-wrap:hover .claude-action-row { opacity: 1; }
    .act-btn {
      width: 28px; height: 28px; border-radius: 6px; border: none;
      background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-400); transition: background 100ms, color 100ms;
    }
    .act-btn:hover { background: rgba(0,0,0,0.06); color: var(--text-100); }

    /* Claude message */
    .msg-claude-wrap { display: flex; flex-direction: column; }
    .claude-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .claude-avatar-icon { width: 20px; height: 20px; color: var(--accent); flex-shrink: 0; }
    .claude-name { font-size: 13px; font-weight: 500; color: var(--text-300); }

    /* Claude body — selectable text */
    .claude-body {
      font-family: 'Tiempos Headline', Georgia, serif;
      font-size: 16px; font-weight: 400; line-height: 1.78;
      color: var(--text-100);
      user-select: text;
      cursor: text;
      position: relative;
    }
    .claude-body p + p { margin-top: 15px; }
    .claude-body h3 {
      font-family: 'Tiempos Headline', Georgia, serif;
      font-size: 17px; font-weight: 600; line-height: 1.35;
      margin: 22px 0 8px;
    }
    .claude-body ul, .claude-body ol { padding-left: 22px; margin: 10px 0; }
    .claude-body li { margin: 5px 0; }
    .claude-body strong { font-weight: 600; }
    .claude-body em { font-style: italic; }

    /* Native text selection color */
    .claude-body ::selection { background: var(--selection-bg); color: inherit; }
    .claude-body ::-moz-selection { background: var(--selection-bg); color: inherit; }

    /* Highlighted span that stays after toolbar interaction */
    .inline-highlight {
      background: var(--selection-bg);
      border-radius: 2px;
    }

    .claude-action-row {
      display: flex; align-items: center; gap: 1px;
      margin-top: 14px; opacity: 0; transition: opacity 140ms;
    }

    /* Inline ask bubble — appears below selection */
    .inline-ask-wrap {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .inline-ask-label {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .inline-ask-quote {
      font-size: 12px;
      color: var(--text-400);
      padding: 4px 10px;
      background: rgba(178, 218, 253, 0.35);
      border-left: 2px solid #74b9f5;
      border-radius: 0 4px 4px 0;
      font-style: italic;
      line-height: 1.5;
      max-width: 500px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .inline-ask-response {
      font-family: 'Tiempos Headline', Georgia, serif;
      font-size: 15px; font-weight: 400; line-height: 1.72;
      color: var(--text-100);
      padding-left: 14px;
      border-left: 2px solid #e4e2dc;
    }
    .inline-ask-response p + p { margin-top: 12px; }

    /* Streaming cursor */
    .stream-cursor {
      display: inline-block; width: 2px; height: 15px;
      background: var(--text-300); border-radius: 1px;
      vertical-align: text-bottom; margin-left: 1px;
      animation: blink 0.85s ease infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Floating selection toolbar ── */
    #selection-toolbar {
      position: fixed;
      z-index: 100;
      background: white;
      border: 1px solid #e4e2dc;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08), 0 8px 24px rgba(0,0,0,0.06);
      display: none;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      pointer-events: all;
      white-space: nowrap;
      transition: opacity 120ms, transform 120ms;
    }
    #selection-toolbar.visible {
      display: flex;
    }

    .toolbar-divider {
      width: 1px; height: 18px;
      background: #e4e2dc;
      flex-shrink: 0;
    }

    .toolbar-icon-btn {
      width: 30px; height: 30px; border-radius: 8px; border: none;
      background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-300);
      transition: background 100ms, color 100ms;
    }
    .toolbar-icon-btn:hover { background: rgba(0,0,0,0.05); color: var(--text-100); }

    .toolbar-btn {
      height: 30px; padding: 0 12px; border-radius: 7px;
      font-size: 12.5px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      font-family: inherit; transition: background 100ms, color 100ms;
    }
    .toolbar-btn-secondary {
      border: 1px solid #e0ddd7;
      background: white;
      color: var(--text-100);
    }
    .toolbar-btn-secondary:hover { background: #f5f4ef; }

    .toolbar-btn-primary {
      border: none;
      background: var(--accent);
      color: white;
    }
    .toolbar-btn-primary:hover { background: #b05535; }

    /* ── Floating inline input (Ask mode) ── */
    #inline-input-card {
      position: fixed;
      z-index: 101;
      background: white;
      border: 1px solid #e4e2dc;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08), 0 8px 24px rgba(0,0,0,0.06);
      display: none;
      flex-direction: column;
      gap: 10px;
      padding: 12px 12px 10px 14px;
      width: 360px;
      pointer-events: all;
    }
    #inline-input-card.visible { display: flex; }

    .iic-context {
      font-size: 11.5px;
      color: var(--text-400);
      padding: 4px 8px;
      background: rgba(178, 218, 253, 0.3);
      border-left: 2px solid #74b9f5;
      border-radius: 0 4px 4px 0;
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .iic-textarea {
      width: 100%; border: none; background: transparent;
      font-size: 14px;
      font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
      color: var(--text-100); resize: none; outline: none;
      line-height: 1.5; min-height: 20px; max-height: 100px;
    }
    .iic-textarea::placeholder { color: var(--text-400); }

    .iic-footer {
      display: flex; align-items: center; justify-content: space-between;
    }

    .iic-add-btn {
      width: 28px; height: 28px; border-radius: 7px;
      border: 1px solid #e0ddd7; background: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-400); transition: background 100ms, color 100ms;
    }
    .iic-add-btn:hover { background: #f5f4ef; color: var(--text-100); }

    .iic-send-btn {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: white; transition: background 80ms, transform 80ms;
    }
    .iic-send-btn:hover { background: #b05535; }
    .iic-send-btn:active { transform: scale(0.92); }
    .iic-send-btn:disabled { background: #c8c5be; cursor: not-allowed; }

    /* ── Bottom input area ── */
    .input-area { padding: 10px 20px 18px; flex-shrink: 0; background: var(--bg-main); }
    .input-wrap {
      max-width: 688px; margin: 0 auto;
      background: var(--bg-input); border-radius: 14px;
      padding: 10px 10px 8px 14px;
      display: flex; flex-direction: column; gap: 6px;
      transition: box-shadow 150ms;
    }
    .input-wrap:focus-within { box-shadow: 0 0 0 1.5px rgba(0,0,0,0.12); }
    .input-field {
      width: 100%; border: none; background: transparent;
      font-size: 15px; font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
      color: var(--text-100); resize: none; outline: none;
      line-height: 1.5; min-height: 22px; max-height: 180px;
    }
    .input-field::placeholder { color: var(--text-400); }
    .input-toolbar { display: flex; align-items: center; justify-content: space-between; }
    .input-left, .input-right { display: flex; align-items: center; gap: 3px; }
    .tool-btn {
      height: 28px; padding: 0 8px; border: none; border-radius: 7px;
      background: transparent; cursor: pointer;
      display: flex; align-items: center; gap: 4px;
      color: var(--text-400); font-size: 12.5px; font-weight: 500;
      font-family: inherit; transition: background 100ms, color 100ms;
    }
    .tool-btn:hover { background: rgba(0,0,0,0.06); color: var(--text-100); }
    .model-btn {
      height: 28px; padding: 0 8px; border: none; border-radius: 7px;
      background: transparent; cursor: pointer;
      display: flex; align-items: center; gap: 3px;
      color: var(--text-400); font-size: 12.5px; font-weight: 500;
      font-family: inherit; transition: background 100ms, color 100ms;
    }
    .model-btn:hover { background: rgba(0,0,0,0.06); color: var(--text-100); }
    .send-btn {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--text-100); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: white; transition: background 100ms, transform 80ms;
    }
    .send-btn:hover:not(:disabled) { background: #333; }
    .send-btn:active:not(:disabled) { transform: scale(0.92); }
    .send-btn:disabled { background: #c8c5be; cursor: not-allowed; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #2db57e; }

    /* Empty state */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: calc(100vh - 180px); gap: 16px; color: var(--text-400); pointer-events: none;
    }
    .empty-state svg { opacity: 0.2; }
    .empty-state p { font-size: 14px; }

    /* Hint pill */
    .selection-hint {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11.5px; color: var(--text-500);
      margin-top: 10px;
      padding: 4px 10px;
      background: rgba(0,0,0,0.03);
      border-radius: 100px;
      border: 1px solid rgba(0,0,0,0.05);
      opacity: 0;
      transition: opacity 400ms;
    }
    .selection-hint.visible { opacity: 1; }
  </style>
</head>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-top">

    </div>

<script>
  const ITERATION = { version: "v2", focus: "Inline text selection Ask", date: "2026-03-17" };

  const RESPONSES = [
    `<p>The distinction you're pointing at is important. Most systems treat state as an implementation concern — something to be managed, cached, synchronized. But for the user, state <em>is</em> the experience. When they can't see it, navigate it, or trust it, the whole thing falls apart.</p><p>The specific failure mode here is what I'd call <strong>implicit state loss</strong> — the user made progress, that progress exists somewhere, but there's no affordance to surface it. It's not that the state is gone; it's that it's become inaccessible. That's a UI problem, not a data problem.</p>`,
    `<p>That's a sharper way to put it than most people do. The linearity isn't a constraint of the technology — it's a design choice that made sense for conversation but doesn't make sense for editing.</p><p>When you're having a conversation, append-only is natural. When you're producing an artifact, it's suffocating. The mental model mismatch is what causes the friction.</p>`,
    `<p>The short answer is yes, but the more interesting question is <em>what</em> you'd preserve. Not all context is equally valuable — some of it is scaffolding that helped you get to this point, some of it is actually load-bearing for what comes next.</p><p>The systems that do this well tend to be explicit about the distinction. They let you mark things as "settled" versus "still in play." That separation does a lot of cognitive work for the user.</p>`,
    `<p>This maps well to how version control works for code, but with an important difference: code has a formal structure that makes diffing tractable. Natural language doesn't. Two paragraphs that say the same thing differently are semantically equivalent but textually distinct — and most diff algorithms will treat them as entirely different.</p><p>The implication is that any versioning system for prose needs a semantic layer, not just a textual one. That's genuinely hard, but it's the right problem to be solving.</p>`,
    `<p>Precisely. The cost of refinement isn't in generating the next version — that's cheap now. The cost is in <strong>evaluating</strong> it: reading, comparing, deciding what's better, figuring out what changed and whether the change is an improvement.</p><p>Everything that reduces that evaluation cost is a multiplier on how much iteration actually happens. Which is why the interface matters more than people assume — it's not a wrapper around the capability, it's a determinant of whether the capability gets used effectively.</p>`,
  ];

  let responseIdx = 0;
  let isStreaming = false;
  let messageCount = 0;
  let activeHighlightSpan = null;
  let activeInlineAnchor = null; // the claude-body element that owns the current selection

  const inputField = document.getElementById('input-field');
  const sendBtn = document.getElementById('send-btn');
  const messagesInner = document.getElementById('messages-inner');
  const messagesWrap = document.getElementById('messages-wrap');
  const convoTitle = document.getElementById('convo-title');
  const toolbar = document.getElementById('selection-toolbar');
  const inlineCard = document.getElementById('inline-input-card');
  const iicTextarea = document.getElementById('iic-textarea');
  const iicSendBtn = document.getElementById('iic-send-btn');
  const iicContextLabel = document.getElementById('iic-context-label');

  // ── Main input ─────────────────────────────────────────────────────
  inputField.addEventListener('input', () => {
    inputField.style.height = 'auto';
    inputField.style.height = Math.min(inputField.scrollHeight, 180) + 'px';
    sendBtn.disabled = inputField.value.trim() === '' || isStreaming;
  });

  inputField.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) submitMain(); }
  });
  sendBtn.addEventListener('click', submitMain);

  function submitMain() {
    const text = inputField.value.trim();
    if (!text || isStreaming) return;
    dismissToolbar(); dismissInlineCard();
    document.getElementById('empty-state')?.remove();
    if (messageCount === 0) convoTitle.textContent = text.length > 42 ? text.slice(0, 42) + '…' : text;
    messageCount++;
    addHumanMessage(text);
    inputField.value = ''; inputField.style.height = 'auto'; sendBtn.disabled = true;
    streamMainResponse(RESPONSES[responseIdx % RESPONSES.length]);
    responseIdx++;
  }

  // ── Text selection detection ───────────────────────────────────────
  let selectionTimeout = null;

  // Walk up the DOM to find the nearest .claude-body ancestor
  function getClaudeBody(node) {
    let el = (node.nodeType === 3) ? node.parentElement : node;
    while (el) {
      if (el.classList && el.classList.contains('claude-body')) return el;
      // Stop early if we've left the messages container
      if (el.id === 'messages-inner') return null;
      el = el.parentElement;
    }
    return null;
  }

  document.addEventListener('mouseup', e => {
    if (toolbar.contains(e.target) || inlineCard.contains(e.target)) return;
    clearTimeout(selectionTimeout);
    // Short delay so the browser has finalised the selection range
    selectionTimeout = setTimeout(() => handleSelectionChange(e), 20);
  });

  // selectionchange fires while dragging — only act on it when mouse is up
  // (mouseup will schedule its own call, so we only need selectionchange as
  // a fallback for keyboard selection)
  let mouseIsDown = false;
  document.addEventListener('mousedown', () => { mouseIsDown = true; });
  document.addEventListener('mouseup',   () => { mouseIsDown = false; });

  document.addEventListener('selectionchange', () => {
    if (mouseIsDown) return; // ignore mid-drag noise
    clearTimeout(selectionTimeout);
    selectionTimeout = setTimeout(handleSelectionChange, 100);
  });

  function handleSelectionChange(e) {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || sel.toString().trim() === '') {
      if (!e || (!toolbar.contains(e.target) && !inlineCard.contains(e.target))) {
        dismissToolbar();
      }
      return;
    }

    const selectedText = sel.toString().trim();
    if (selectedText.length < 2) { dismissToolbar(); return; }

    const range = sel.getRangeAt(0);
    const claudeBody = getClaudeBody(range.commonAncestorContainer);
    if (!claudeBody) { dismissToolbar(); return; }

    activeInlineAnchor = claudeBody;

    // Position toolbar just below the end of the selection
    const rect = range.getBoundingClientRect();
    const toolbarW = 290;
    let left = rect.right - toolbarW;
    let top  = rect.bottom + 8;

    left = Math.max(8, Math.min(left, window.innerWidth - toolbarW - 8));
    if (top + 60 > window.innerHeight) top = rect.top - 52;

    toolbar.style.left = left + 'px';
    toolbar.style.top  = top  + 'px';
    toolbar.classList.add('visible');

    toolbar._selectedText = selectedText;
    toolbar._range        = range.cloneRange();
    toolbar._claudeBody   = claudeBody;
  }

  function dismissToolbar() {
    toolbar.classList.remove('visible');
  }

  function dismissInlineCard() {
    inlineCard.classList.remove('visible');
    removeHighlight();
    iicTextarea.value = '';
    iicSendBtn.disabled = true;
  }

  // Dismiss panels on outside click — moved to mouseup so it doesn't
  // fire before the selection is anchored (fixes the multi-response bug)
  document.addEventListener('mouseup', e => {
    if (toolbar.contains(e.target) || inlineCard.contains(e.target)) return;
    // Only dismiss inline card on a plain click (collapsed selection)
    const sel = window.getSelection();
    if (sel && sel.isCollapsed) {
      dismissInlineCard();
    }
  }, true); // capture phase so it runs before the toolbar-show handler

  // ── Toolbar actions ────────────────────────────────────────────────
  document.getElementById('toolbar-copy-btn').addEventListener('click', () => {
    const text = toolbar._selectedText || '';
    navigator.clipboard.writeText(text).catch(() => {});
    dismissToolbar();
  });

  document.getElementById('toolbar-reply-btn').addEventListener('click', () => {
    const text = toolbar._selectedText || '';
    inputField.value = `"${text}" — `;
    inputField.style.height = 'auto';
    inputField.style.height = Math.min(inputField.scrollHeight, 180) + 'px';
    sendBtn.disabled = false;
    inputField.focus();
    const len = inputField.value.length;
    inputField.setSelectionRange(len, len);
    dismissToolbar();
    window.getSelection().removeAllRanges();
  });

  document.getElementById('toolbar-ask-btn').addEventListener('click', () => {
    const selectedText = toolbar._selectedText || '';
    const range = toolbar._range;
    const claudeBody = toolbar._claudeBody;

    if (!range || !claudeBody) return;

    // Wrap the selected text in a highlight span
    removeHighlight();
    try {
      const span = document.createElement('mark');
      span.className = 'inline-highlight';
      range.surroundContents(span);
      activeHighlightSpan = span;
    } catch(err) {
      // Complex ranges can't be surrounded — just proceed without persistent highlight
    }

    window.getSelection().removeAllRanges();
    dismissToolbar();

    // Show inline card anchored below the selection
    const bodyRect = claudeBody.getBoundingClientRect();
    const highlightEl = activeHighlightSpan || claudeBody;
    const hlRect = highlightEl.getBoundingClientRect();

    // Position card to the right of content, aligned with selection bottom
    const cardW = 360;
    let left = hlRect.right + 12;
    let top = hlRect.top - 10;

    // If not enough room to the right, place below
    if (left + cardW > window.innerWidth - 12) {
      left = Math.max(8, hlRect.left);
      top = hlRect.bottom + 10;
    }
    top = Math.max(8, Math.min(top, window.innerHeight - 160));

    inlineCard.style.left = left + 'px';
    inlineCard.style.top = top + 'px';

    // Set context label
    const truncated = selectedText.length > 60 ? selectedText.slice(0, 60) + '…' : selectedText;
    iicContextLabel.textContent = truncated;

    inlineCard.classList.add('visible');
    iicTextarea.focus();

    // Store reference to which message to attach response to
    inlineCard._claudeBody = claudeBody;
    inlineCard._selectedText = selectedText;
  });

  function removeHighlight() {
    if (activeHighlightSpan) {
      const parent = activeHighlightSpan.parentNode;
      if (parent) {
        while (activeHighlightSpan.firstChild) {
          parent.insertBefore(activeHighlightSpan.firstChild, activeHighlightSpan);
        }
        parent.removeChild(activeHighlightSpan);
        parent.normalize();
      }
      activeHighlightSpan = null;
    }
  }

  // ── Inline card ────────────────────────────────────────────────────
  iicTextarea.addEventListener('input', () => {
    iicTextarea.style.height = 'auto';
    iicTextarea.style.height = Math.min(iicTextarea.scrollHeight, 100) + 'px';
    iicSendBtn.disabled = iicTextarea.value.trim() === '';
  });

  iicTextarea.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!iicSendBtn.disabled) submitInline(); }
    if (e.key === 'Escape') dismissInlineCard();
  });

  iicSendBtn.addEventListener('click', submitInline);

  function submitInline() {
    const question = iicTextarea.value.trim();
    const claudeBody = inlineCard._claudeBody;
    const selectedText = inlineCard._selectedText || '';
    if (!question || !claudeBody) return;

    dismissInlineCard();

    // Find the msg-claude-wrap that owns this body
    const wrapper = claudeBody.closest('.msg-claude-wrap');
    if (!wrapper) return;

    // Inject inline ask thread below the response
    const existing = wrapper.querySelector('.inline-ask-wrap');
    if (existing) existing.remove();

    const askWrap = document.createElement('div');
    askWrap.className = 'inline-ask-wrap';

    // Show the quoted selection + the question
    const quoteEl = document.createElement('div');
    quoteEl.className = 'inline-ask-quote';
    const truncQ = selectedText.length > 80 ? selectedText.slice(0, 80) + '…' : selectedText;
    quoteEl.textContent = `"${truncQ}"`;

    // Human question bubble (compact)
    const qBubble = document.createElement('div');
    qBubble.style.cssText = 'display:flex;justify-content:flex-end;margin:4px 0 8px;';
    const qInner = document.createElement('div');
    qInner.style.cssText = `
      background: var(--bg-human); border-radius: 12px 12px 3px 12px;
      padding: 6px 12px; font-size: 14px; line-height: 1.5;
      max-width: 75%; color: var(--text-100);
    `;
    qInner.textContent = question;
    qBubble.appendChild(qInner);

    // Response area
    const responseEl = document.createElement('div');
    responseEl.className = 'inline-ask-response';
    const cursor = document.createElement('span');
    cursor.className = 'stream-cursor';
    responseEl.appendChild(cursor);

    askWrap.appendChild(quoteEl);
    askWrap.appendChild(qBubble);
    askWrap.appendChild(responseEl);
    wrapper.appendChild(askWrap);
    scrollToBottom();

    // Stream inline response
    const resp = RESPONSES[responseIdx % RESPONSES.length];
    responseIdx++;
    streamInlineResponse(responseEl, cursor, resp);
  }

  // ── Streaming ──────────────────────────────────────────────────────
  function streamMainResponse(html) {
    isStreaming = true;
    const body = addClaudeMessageWrapper();
    const cursor = document.createElement('span');
    cursor.className = 'stream-cursor';
    body.appendChild(cursor);
    scrollToBottom();
    streamInto(body, cursor, html, () => {
      isStreaming = false;
      sendBtn.disabled = inputField.value.trim() === '';
    });
  }

  function streamInlineResponse(container, cursor, html) {
    streamInto(container, cursor, html, () => {});
  }

  function streamInto(container, cursor, html, onDone) {
    const plainLen = html.replace(/<[^>]+>/g, '').replace(/&[a-z]+;/g, ' ').length;
    let charIdx = 0;

    function tick() {
      if (charIdx >= plainLen) {
        cursor.remove();
        onDone();
        return;
      }
      charIdx = Math.min(charIdx + Math.floor(Math.random() * 4) + 1, plainLen);
      container.innerHTML = renderUpTo(html, charIdx);
      container.appendChild(cursor);
      scrollToBottom();
      setTimeout(tick, Math.random() * 18 + 6);
    }
    tick();
  }

  function renderUpTo(html, targetChars) {
    let textSeen = 0, result = '', i = 0;
    const len = html.length;
    const tagStack = [];
    while (i < len) {
      if (html[i] === '<') {
        const end = html.indexOf('>', i);
        if (end === -1) break;
        const tag = html.slice(i, end + 1);
        result += tag;
        if (!tag.startsWith('</') && !tag.endsWith('/>')) {
          const m = tag.match(/^<(\w+)/);
          if (m) tagStack.push(m[1]);
        } else if (tag.startsWith('</')) tagStack.pop();
        i = end + 1;
      } else if (html[i] === '&') {
        const end = html.indexOf(';', i);
        if (end !== -1 && end - i <= 8) {
          if (textSeen < targetChars) { result += html.slice(i, end + 1); textSeen++; } else break;
          i = end + 1;
        } else {
          if (textSeen < targetChars) { result += html[i]; textSeen++; i++; } else break;
        }
      } else {
        if (textSeen < targetChars) { result += html[i]; textSeen++; i++; } else break;
      }
    }
    while (tagStack.length) result += `</${tagStack.pop()}>`;
    return result;
  }

  // ── Helpers ────────────────────────────────────────────────────────
  function scrollToBottom() { messagesWrap.scrollTop = messagesWrap.scrollHeight; }
  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  }
