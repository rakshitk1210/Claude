<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude — v4 Inline Ask + Iterate</title>
  <style>
    @font-face {
      font-family: 'Tiempos Headline';
      src: url('../../Test Tiempos Headline/test-tiempos-headline-light.woff2') format('woff2');
      font-weight: 300; font-style: normal;
    }
    @font-face {
      font-family: 'Tiempos Headline';
      src: url('../../Test Tiempos Headline/test-tiempos-headline-regular.woff2') format('woff2');
      font-weight: 400; font-style: normal;
    }
    @font-face {
      font-family: 'Tiempos Headline';
      src: url('../../Test Tiempos Headline/test-tiempos-headline-medium.woff2') format('woff2');
      font-weight: 500; font-style: normal;
    }
    @font-face {
      font-family: 'Tiempos Headline';
      src: url('../../Test Tiempos Headline/test-tiempos-headline-semibold.woff2') format('woff2');
      font-weight: 600; font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-sidebar: #1c1917;
      --bg-main:    #f5f4ef;
      --bg-input:   #eceae3;
      --bg-human:   #e8e6df;
      --text-100:   #1c1917;
      --text-300:   #6b6860;
      --text-400:   #9b9892;
      --text-500:   #b5b2ab;
      --accent:     #c15f3c;
      --border:     #e4e2dc;
      --sel-bg:     #b2dafd;
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
      background: var(--bg-main); color: var(--text-100);
    }

    /* ─── App shell ─────────────────────────────────────────────── */
    .app { display: flex; height: 100vh; }

    /* ─── Sidebar ───────────────────────────────────────────────── */
    .sidebar {
      width: 54px; background: var(--bg-sidebar);
      display: flex; flex-direction: column; align-items: center;
      padding: 8px 0 10px; flex-shrink: 0;
    }
    .sidebar-top  { display: flex; flex-direction: column; align-items: center; gap: 1px; flex: 1; }
    .sidebar-bottom { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .sb-btn {
      width: 36px; height: 36px; border-radius: 8px; border: none;
      background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #9b9892; transition: background 120ms, color 120ms;
    }
    .sb-btn:hover  { background: rgba(255,255,255,.08); color: #f5f4ef; }
    .sb-btn.active { color: rgba(255,255,255,.85); }
    .sb-divider { width: 22px; height: 1px; background: rgba(255,255,255,.07); margin: 5px 0; }
    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 10.5px; font-weight: 600; color: white; cursor: pointer; letter-spacing: .03em;
    }

    /* ─── Main ──────────────────────────────────────────────────── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* ─── Topbar ─────────────────────────────────────────────────── */
    .topbar {
      height: 46px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; border-bottom: 1px solid var(--border);
      flex-shrink: 0; background: var(--bg-main); z-index: 5;
    }
    .topbar-title {
      display: flex; align-items: center; gap: 5px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      border-radius: 6px; padding: 4px 6px; margin-left: -6px; transition: background 100ms;
    }
    .topbar-title:hover { background: rgba(0,0,0,.05); }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .iterate-badge {
      display: none; align-items: center; gap: 5px;
      height: 24px; padding: 0 10px;
      border-radius: 100px; background: rgba(193,95,60,.10);
      border: 1px solid rgba(193,95,60,.20);
      font-size: 11.5px; font-weight: 600; color: var(--accent);
      cursor: pointer; transition: background 100ms;
    }
    .iterate-badge:hover { background: rgba(193,95,60,.16); }
    .iterate-badge.visible { display: flex; }
    .badge-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .share-btn {
      height: 29px; padding: 0 12px; border: 1px solid var(--border);
      border-radius: 8px; background: white; font-size: 13px; font-weight: 500;
      cursor: pointer; color: var(--text-100); transition: background 100ms; font-family: inherit;
    }
    .share-btn:hover { background: var(--bg-input); }

    /* ─── Content area ──────────────────────────────────────────── */
    .content-area { flex: 1; display: flex; overflow: hidden; }

    /* ─── Chat pane ─────────────────────────────────────────────── */
    .chat-pane {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; min-width: 0;
      transition: flex 350ms cubic-bezier(.4,0,.2,1);
    }
    .app.iterate-open .chat-pane { flex: 0 0 auto; width: 45%; min-width: 320px; }

    .messages-wrap { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
    .messages-wrap::-webkit-scrollbar { width: 5px; }
    .messages-wrap::-webkit-scrollbar-thumb { background: rgba(0,0,0,.1); border-radius: 3px; }

    .messages-inner {
      max-width: 688px; margin: 0 auto; padding: 36px 24px 24px;
      display: flex; flex-direction: column; gap: 28px;
    }
    .app.iterate-open .messages-inner { max-width: 560px; }

    /* Human msg */
    .msg-human { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .human-bubble {
      background: var(--bg-human); border-radius: 18px 18px 4px 18px;
      padding: 10px 15px; font-size: 15px; line-height: 1.55;
      max-width: 78%; color: var(--text-100); word-break: break-word;
    }
    .human-meta { display: flex; align-items: center; gap: 10px; padding-right: 2px; }
    .meta-time  { font-size: 11px; color: var(--text-400); }
    .act-row { display: flex; align-items: center; gap: 1px; opacity: 0; transition: opacity 140ms; }
    .msg-human:hover .act-row { opacity: 1; }
    .msg-claude-wrap:hover .claude-act-row { opacity: 1; }
    .act-btn {
      width: 28px; height: 28px; border-radius: 6px; border: none; background: transparent;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-400); transition: background 100ms, color 100ms;
    }
    .act-btn:hover { background: rgba(0,0,0,.06); color: var(--text-100); }

    /* Claude msg */
    .msg-claude-wrap { display: flex; flex-direction: column; }
    .claude-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .claude-avatar { width: 20px; height: 20px; color: var(--accent); flex-shrink: 0; }
    .claude-name  { font-size: 13px; font-weight: 500; color: var(--text-300); }
    .claude-body {
      font-family: 'Tiempos Headline', Georgia, serif;
      font-size: 16px; font-weight: 400; line-height: 1.78; color: var(--text-100);
    }
    .claude-body p + p { margin-top: 14px; }
    .claude-body strong { font-weight: 600; }
    .claude-body em { font-style: italic; }
    .claude-act-row {
      display: flex; align-items: center; gap: 1px; margin-top: 12px;
      opacity: 0; transition: opacity 140ms;
    }

    /* Selection highlight inside claude-body */
    .claude-body ::selection    { background: var(--sel-bg); }
    .claude-body ::-moz-selection { background: var(--sel-bg); }
    .inline-highlight { background: rgba(178,218,253,.5); border-radius: 2px; }

    /* ── Inline ask thread (sits inside .msg-claude-wrap) ── */
    .inline-ask-wrap {
      margin-top: 18px;
      border-left: 2px solid #74b9f5;
      padding-left: 14px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .inline-ask-q {
      font-size: 13px; font-weight: 600; color: var(--text-300);
      display: flex; align-items: center; gap: 6px;
    }
    .inline-ask-q-badge {
      font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
      background: rgba(116,185,245,.2); color: #4da0e0; border-radius: 4px; padding: 1px 5px;
    }
    .inline-ask-answer {
      font-family: 'Tiempos Headline', Georgia, serif;
      font-size: 15px; line-height: 1.75; color: var(--text-100);
    }

    /* ── Iterate mode CTA ── */
    .iterate-cta {
      display: flex; align-items: center; gap: 8px; margin-top: 16px;
      padding: 9px 14px; border-radius: 10px; border: 1px solid var(--border);
      background: white; cursor: pointer; color: var(--text-300); font-size: 13px;
      transition: border-color 150ms, background 150ms, color 150ms; width: fit-content;
      font-family: inherit;
    }
    .iterate-cta:hover { border-color: var(--accent); color: var(--accent); background: rgba(193,95,60,.04); }
    .iterate-cta.hidden { display: none; }

    /* Streaming cursor */
    .stream-cursor {
      display: inline-block; width: 2px; height: 14px; background: var(--text-300);
      border-radius: 1px; vertical-align: text-bottom; margin-left: 1px;
      animation: blink .85s ease infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ─── Input area ────────────────────────────────────────────── */
    .input-area { padding: 10px 20px 18px; flex-shrink: 0; background: var(--bg-main); }
    .input-wrap {
      max-width: 688px; margin: 0 auto;
      background: var(--bg-input); border-radius: 14px;
      padding: 10px 10px 8px 14px;
      display: flex; flex-direction: column; gap: 6px;
      transition: box-shadow 150ms;
    }
    .app.iterate-open .input-wrap { max-width: 100%; }
    .input-wrap:focus-within { box-shadow: 0 0 0 1.5px rgba(0,0,0,.12); }

    /* Context strip inside input (for iterate mode) */
    .input-ctx {
      display: none; align-items: flex-start; gap: 8px;
      padding: 6px 0 8px; border-bottom: 1px solid rgba(0,0,0,.07); margin-bottom: 2px;
    }
    .input-ctx.visible { display: flex; }
    .input-ctx-bar {
      width: 2px; min-height: 32px; align-self: stretch;
      background: #74b9f5; border-radius: 1px; flex-shrink: 0;
    }
    .input-ctx-text {
      font-size: 13px; line-height: 1.5; color: var(--text-400); font-style: italic; flex: 1; min-width: 0;
    }
    .input-ctx-close {
      width: 18px; height: 18px; border-radius: 4px; border: none; background: transparent;
      cursor: pointer; color: var(--text-400);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: color 100ms;
    }
    .input-ctx-close:hover { color: var(--text-100); }

    .input-field {
      width: 100%; border: none; background: transparent;
      font-size: 15px; font-family: inherit; color: var(--text-100);
      resize: none; outline: none; line-height: 1.5;
      min-height: 22px; max-height: 140px;
    }
    .input-field::placeholder { color: var(--text-400); }
    .input-tb { display: flex; align-items: center; justify-content: space-between; }
    .tb-left, .tb-right { display: flex; align-items: center; gap: 3px; }
    .tool-btn {
      height: 28px; padding: 0 8px; border: none; border-radius: 7px;
      background: transparent; cursor: pointer; display: flex; align-items: center; gap: 4px;
      color: var(--text-400); font-size: 12.5px; font-weight: 500; font-family: inherit;
      transition: background 100ms, color 100ms;
    }
    .tool-btn:hover { background: rgba(0,0,0,.06); color: var(--text-100); }
    .model-btn {
      height: 28px; padding: 0 8px; border: none; border-radius: 7px;
      background: transparent; cursor: pointer; display: flex; align-items: center; gap: 3px;
      color: var(--text-400); font-size: 12.5px; font-weight: 500; font-family: inherit;
      transition: background 100ms, color 100ms;
    }
    .model-btn:hover { background: rgba(0,0,0,.06); color: var(--text-100); }
    .send-btn {
      width: 30px; height: 30px; border-radius: 50%; background: var(--text-100);
      border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: white; transition: background 100ms, transform 80ms;
    }
    .send-btn:hover:not(:disabled) { background: #333; }
    .send-btn:active:not(:disabled) { transform: scale(.92); }
    .send-btn:disabled { background: #c8c5be; cursor: not-allowed; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #2db57e; }

    /* ─── Iterate panel ─────────────────────────────────────────── */
    .iterate-pane {
      width: 0; overflow: hidden; border-left: 1px solid var(--border);
      background: white; display: flex; flex-direction: column;
      transition: width 350ms cubic-bezier(.4,0,.2,1); flex-shrink: 0;
    }
    .app.iterate-open .iterate-pane { width: 55%; }

    .version-tabs {
      display: flex; align-items: flex-end;
      border-bottom: 1px solid var(--border);
      padding: 0 16px; flex-shrink: 0; height: 46px; gap: 0;
      overflow-x: auto; position: relative;
    }
    .version-tabs::-webkit-scrollbar { display: none; }

    .version-tab {
      display: flex; align-items: center; gap: 6px;
      padding: 0 14px; height: 100%;
      font-size: 13px; font-weight: 500; color: var(--text-400);
      cursor: pointer; border: none; background: none;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      white-space: nowrap; transition: color 120ms, border-color 120ms; font-family: inherit;
    }
    .version-tab:hover { color: var(--text-100); }
    .version-tab.active { color: var(--text-100); border-bottom-color: var(--accent); }
    .tab-dot { width: 6px; height: 6px; border-radius: 50%; background: transparent; flex-shrink: 0; }
    .version-tab.active .tab-dot { background: var(--accent); }

    .tab-close {
      width: 16px; height: 16px; border-radius: 3px; border: none; background: transparent;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-400); opacity: 0; transition: opacity 100ms, background 100ms;
      font-family: inherit;
    }
    .version-tab:hover .tab-close { opacity: .6; }
    .version-tab.active .tab-close { opacity: .5; }
    .tab-close:hover { background: rgba(0,0,0,.06); opacity: 1 !important; }

    .tab-add-btn {
      width: 28px; height: 28px; border-radius: 7px; border: none; background: transparent;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-400); align-self: center; margin-left: 4px; flex-shrink: 0;
      transition: background 100ms, color 100ms;
    }
    .tab-add-btn:hover { background: rgba(0,0,0,.05); color: var(--text-100); }

    .panel-close {
      position: absolute; top: 9px; right: 10px; z-index: 2;
      width: 26px; height: 26px; border-radius: 6px; border: none; background: transparent;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-400); transition: background 100ms, color 100ms;
    }
    .panel-close:hover { background: rgba(0,0,0,.05); color: var(--text-100); }

    .version-content-wrap { flex: 1; overflow-y: auto; position: relative; }
    .version-content-wrap::-webkit-scrollbar { width: 5px; }
    .version-content-wrap::-webkit-scrollbar-thumb { background: rgba(0,0,0,.08); border-radius: 3px; }

    .version-panel { display: none; padding: 30px 40px 40px; min-height: 100%; }
    .version-panel.active { display: block; }

    .version-label {
      font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
      color: var(--text-400); margin-bottom: 18px;
    }

    .version-text {
      font-family: 'Tiempos Headline', Georgia, serif;
      font-size: 17px; font-weight: 400; line-height: 1.8; color: var(--text-100);
      outline: none; min-height: 80px;
    }
    .version-text p + p { margin-top: 16px; }
    .version-text ::selection    { background: var(--sel-bg); }
    .version-text ::-moz-selection { background: var(--sel-bg); }

    /* ── Inline ask thread inside version panel ── */
    .v-inline-wrap {
      margin-top: 20px; border-left: 2px solid #74b9f5; padding-left: 14px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .v-inline-q {
      font-size: 12.5px; font-weight: 600; color: var(--text-400);
      display: flex; align-items: center; gap: 6px;
    }
    .v-inline-q-badge {
      font-size: 9.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
      background: rgba(116,185,245,.2); color: #4da0e0; border-radius: 4px; padding: 1px 5px;
    }
    .v-inline-answer {
      font-family: 'Tiempos Headline', Georgia, serif;
      font-size: 16px; line-height: 1.75; color: var(--text-100);
    }

    /* Skeleton loading */
    .skeleton-wrap { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .skeleton-line {
      height: 16px; border-radius: 8px;
      background: linear-gradient(90deg, #f0eeea 25%, #e4e2dc 50%, #f0eeea 75%);
      background-size: 200% 100%; animation: shimmer 1.4s ease infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* Empty state */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: calc(100vh - 200px); gap: 16px; color: var(--text-400); pointer-events: none;
    }
    .empty-state svg { opacity: .2; }
    .empty-state p { font-size: 14px; }

    /* ─── Shared floating toolbar base ─────────────────────────── */
    .floating-toolbar {
      position: fixed; z-index: 200;
      background: white; border: 1px solid #e4e2dc;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.07);
      display: none; align-items: center; gap: 5px; padding: 5px 7px;
      pointer-events: all; white-space: nowrap; user-select: none;
    }
    .floating-toolbar.visible { display: flex; }
    .ft-divider { width: 1px; height: 18px; background: #e4e2dc; }
    .ft-icon-btn {
      width: 28px; height: 28px; border-radius: 7px; border: none; background: transparent;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-300); transition: background 100ms, color 100ms;
    }
    .ft-icon-btn:hover { background: rgba(0,0,0,.05); color: var(--text-100); }
    .ft-btn {
      height: 28px; padding: 0 10px; border-radius: 7px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 4px; font-family: inherit;
    }
    .ft-btn-secondary { border: 1px solid #e0ddd7; background: white; color: var(--text-100); }
    .ft-btn-secondary:hover { background: #f5f4ef; }
    .ft-btn-primary { border: none; background: var(--accent); color: white; }
    .ft-btn-primary:hover { background: #b05535; }

    /* ─── Inline ask floating card (chat pane) ──────────────────── */
    #inline-card {
      position: fixed; z-index: 201;
      background: white; border: 1px solid #e4e2dc;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08), 0 12px 32px rgba(0,0,0,.07);
      display: none; flex-direction: column; gap: 10px;
      padding: 12px 12px 10px 14px;
      width: 340px; pointer-events: all;
    }
    #inline-card.visible { display: flex; }

    .ic-ctx {
      font-size: 11.5px; color: var(--text-400); font-style: italic;
      padding: 4px 8px; background: rgba(178,218,253,.3);
      border-left: 2px solid #74b9f5; border-radius: 0 4px 4px 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ic-textarea {
      width: 100%; border: none; background: transparent;
      font-size: 14px; font-family: inherit; color: var(--text-100);
      resize: none; outline: none; line-height: 1.5;
      min-height: 20px; max-height: 100px;
    }
    .ic-textarea::placeholder { color: var(--text-400); }
    .ic-footer {
      display: flex; align-items: center; justify-content: space-between;
    }
    .ic-send {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: white; transition: background 80ms, transform 80ms;
    }
    .ic-send:hover { background: #b05535; }
    .ic-send:active { transform: scale(.92); }
    .ic-send:disabled { background: #c8c5be; cursor: not-allowed; }
    .ic-close {
      width: 28px; height: 28px; border-radius: 7px; border: none; background: transparent;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-400); transition: background 100ms, color 100ms;
    }
    .ic-close:hover { background: rgba(0,0,0,.05); color: var(--text-100); }
  </style>
</head>
<body>
<div class="app" id="app">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <button class="sb-btn active">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M16.5 4C17.3284 4 18 4.67157 18 5.5V14.5C18 15.3284 17.3284 16 16.5 16H3.5C2.67157 16 2 15.3284 2 14.5V5.5C2 4.67157 2.67157 4 3.5 4H16.5ZM7 15H16.5C16.7761 15 17 14.7761 17 14.5V5.5C17 5.22386 16.7761 5 16.5 5H7V15ZM3.5 5C3.22386 5 3 5.22386 3 5.5V14.5C3 14.7761 3.22386 15 3.5 15H6V5H3.5Z"/></svg>
      </button>
      <button class="sb-btn" onclick="newChat()">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M10 3C10.4142 3 10.75 3.33579 10.75 3.75V9.25H16.25C16.6642 9.25 17 9.58579 17 10C17 10.3882 16.7051 10.7075 16.3271 10.7461L16.25 10.75H10.75V16.25C10.75 16.6642 10.4142 17 10 17C9.58579 17 9.25 16.6642 9.25 16.25V10.75H3.75C3.33579 10.75 3 10.4142 3 10C3 9.58579 3.33579 9.25 3.75 9.25H9.25V3.75C9.25 3.33579 9.58579 3 10 3Z"/></svg>
      </button>
      <button class="sb-btn">

<script>
  // ── Content pools ──────────────────────────────────────────────────────────
  const CHAT_RESPONSES = [
    `<p>The distinction you're pointing at is real. Most systems treat state as an implementation concern — something to be managed, cached, synchronized. But for the user, state <em>is</em> the experience. When they can't see it, navigate it, or trust it, the whole thing falls apart.</p><p>The specific failure mode here is <strong>implicit state loss</strong> — the user made progress, that progress exists somewhere, but there's no affordance to surface it. It's not that the state is gone; it's that it's become inaccessible. That's a UI problem, not a data problem.</p>`,
    `<p>That's a sharper way to put it than most people do. The linearity isn't a constraint of the technology — it's a design choice that made sense for conversation but doesn't make sense for editing.</p><p>When you're having a conversation, append-only is natural. When you're producing an artifact, it's suffocating. The mental model mismatch is what causes the friction.</p>`,
    `<p>Precisely. The cost of refinement isn't in generating the next version — that's cheap now. The cost is in <strong>evaluating</strong> it: reading, comparing, deciding what's better, figuring out what changed and whether the change is an improvement.</p><p>Everything that reduces evaluation cost is a multiplier on how much iteration actually happens. Which is why the interface matters more than people assume.</p>`,
    `<p>There's a real gap between what the model can do and what the interface lets you express. The model can hold enormous nuance; the text box can only hold one sentence at a time. The interaction surface is the bottleneck — not the intelligence.</p>`,
  ];

  const INLINE_RESPONSES = [
    `That's the crux of the problem — <strong>visibility</strong>. The state exists; the affordance to reach it doesn't. The fix is almost never more complexity, it's making what's already there navigable.`,
    `Think of it as the difference between a conversation and a document. One is ephemeral by design. The other expects to be revisited. Once you produce something worth keeping, the interaction model should shift to match.`,
    `The implicit assumption here is that "more" is always forward. But iteration requires going sideways — exploring alternatives that aren't strictly improvements, just <em>different</em>. The interface needs to make lateral moves feel safe.`,
    `Exactly. <strong>Evaluation cost</strong> is the hidden variable. Lowering it doesn't change what gets generated — it changes what gets kept. The quality of the output is shaped as much by the review surface as by the model.`,
  ];

  const VERSION_VARIANTS = [
    `<p>State, from the user's perspective, is not a technical concept — it's a <em>trust</em> concept. When the system doesn't surface what it knows, the user has to hold everything in their head. That cognitive overhead is where most people give up.</p><p><strong>Implicit state loss</strong> is the core failure: progress exists but becomes unreachable. The fix isn't better storage — it's better affordances for navigating what's already there.</p>`,
    `<p>Here's the core tension: state is invisible by default, but refinement requires comparing states. The moment you need to say "go back to what I had before," you're asking the system to surface something it was never designed to show you.</p><p>The linearity of chat makes this worse — every new message buries the previous output. But the solution isn't more messages. It's a different <em>relationship</em> between the conversation and the artifact it's producing.</p>`,
    `<p>Most interfaces treat state as infrastructure. Users experience it as memory. When the system forgets — or appears to — users don't think "cache invalidation." They think "it lost my work."</p><p>The gap between those two frames is where most AI tool frustration lives. Closing it requires making the history of the artifact visible and navigable — not just the history of the conversation.</p>`,
    `<p>The iteration problem is fundamentally an <strong>evaluation problem</strong>. Generating the next version is cheap. Knowing which version is better is hard. Every interface choice that reduces evaluation cost — side-by-side comparison, highlighted diffs, easy rollback — directly increases the quality of the final output.</p>`,
  ];

  // ── State ──────────────────────────────────────────────────────────────────
  let isStreaming    = false;
  let messageCount   = 0;
  let chatRespIdx    = 0;
  let inlineRespIdx  = 0;
  let variantIdx     = 0;
  let iterateOpen    = false;
  let versions       = [];
  let activeVerId    = null;

  // Inline card state
  let icTargetWrap   = null;  // .msg-claude-wrap to append inline response to
  let icSelectedText = '';
  let icTargetPanel  = null;  // version panel for version-pane inline ask

  // Chat toolbar state
  let ctSelectedText = '';
  let ctTargetWrap   = null;

  // Version toolbar state
  let vtSelectedText = '';
  let vtTargetPanel  = null;

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const app          = document.getElementById('app');
  const inputField   = document.getElementById('input-field');
  const sendBtn      = document.getElementById('send-btn');
  const msgInner     = document.getElementById('messages-inner');
  const msgWrap      = document.getElementById('messages-wrap');
  const convoTitle   = document.getElementById('convo-title');
  const iterateBadge = document.getElementById('iterate-badge');
  const verTabs      = document.getElementById('version-tabs');
  const verContent   = document.getElementById('version-content-wrap');
  const inputCtx     = document.getElementById('input-ctx');
  const inputCtxText = document.getElementById('input-ctx-text');

  const chatToolbar  = document.getElementById('chat-toolbar');
  const versionToolbar = document.getElementById('version-toolbar');
  const inlineCard   = document.getElementById('inline-card');
  const icTextarea   = document.getElementById('ic-textarea');
  const icSend       = document.getElementById('ic-send');

  // ── Main input ─────────────────────────────────────────────────────────────
  inputField.addEventListener('input', () => {
    inputField.style.height = 'auto';
    inputField.style.height = Math.min(inputField.scrollHeight, 140) + 'px';
    sendBtn.disabled = !inputField.value.trim() || isStreaming;
  });
  inputField.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) submitMain(); }
  });
  sendBtn.addEventListener('click', submitMain);

  function submitMain() {
    const text = inputField.value.trim();
    if (!text || isStreaming) return;

    const hasCtx = inputCtx.classList.contains('visible');
    const ctxText = inputCtxText.textContent;

    document.getElementById('empty-state')?.remove();
    if (messageCount === 0) convoTitle.textContent = text.length > 42 ? text.slice(0,42)+'…' : text;
    messageCount++;

    addHumanMsg(text);
    inputField.value = ''; inputField.style.height = 'auto'; sendBtn.disabled = true;
    clearMainCtx();

    if (hasCtx && iterateOpen) {
      generateNewVersion(ctxText, text);
    } else {
      const html = CHAT_RESPONSES[chatRespIdx++ % CHAT_RESPONSES.length];
      streamChatResponse(html);
    }
  }

  // ── Human message ──────────────────────────────────────────────────────────
  function addHumanMsg(text) {
    const el = document.createElement('div');
    el.className = 'msg-human';
    el.innerHTML = `
      <div class="human-bubble">${esc(text)}</div>
      <div class="human-meta">
        <div class="act-row">

  function clearMainCtx() {

  function scrollBottom() { msgWrap.scrollTop = msgWrap.scrollHeight; }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function streamInto(container, cursor, html, onDone) {
    const plainLen = html.replace(/<[^>]+>/g,'').replace(/&[a-z]+;/g,' ').length;
    let charIdx = 0;
    function tick() {
      if (charIdx >= plainLen) { cursor.remove(); onDone(); return; }
      charIdx = Math.min(charIdx + Math.floor(Math.random()*4)+1, plainLen);
      container.innerHTML = renderUpTo(html, charIdx);
      container.appendChild(cursor);
      scrollBottom();
      setTimeout(tick, Math.random()*16 + 5);
    }
    tick();
  }

  function renderUpTo(html, target) {
    let seen=0, out='', i=0;
    const stack=[];
    while (i < html.length) {
      if (html[i] === '<') {
        const end = html.indexOf('>', i); if (end===-1) break;
        const tag = html.slice(i, end+1);
        out += tag;
        if (!tag.startsWith('</') && !tag.endsWith('/>')) {
          const m = tag.match(/^<(\w+)/); if (m) stack.push(m[1]);
        } else if (tag.startsWith('</')) stack.pop();
        i = end+1;
      } else if (html[i]==='&') {
        const end = html.indexOf(';', i);
        if (end!==-1 && end-i<=8) {
          if (seen < target) { out += html.slice(i, end+1); seen++; } else break;
          i = end+1;
        } else {
          if (seen < target) { out += html[i]; seen++; i++; } else break;
        }
      } else {
        if (seen < target) { out += html[i]; seen++; i++; } else break;
      }
    }
    while (stack.length) out += `</${stack.pop()}>`;
    return out;
  }

  function newChat() {
