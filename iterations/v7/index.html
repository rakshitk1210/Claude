<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude — v7 Iterate Canvas</title>
  <style>
    /* ── Fonts ──────────────────────────────────────────────────────────── */
    @font-face {
      font-family: 'Tiempos Headline';
      src: url('../../Test Tiempos Headline/test-tiempos-headline-light.woff2') format('woff2');
      font-weight: 300; font-style: normal;
    }
    @font-face {
      font-family: 'Tiempos Headline';
      src: url('../../Test Tiempos Headline/test-tiempos-headline-regular.woff2') format('woff2');
      font-weight: 400; font-style: normal;
    }
    @font-face {
      font-family: 'Tiempos Headline';
      src: url('../../Test Tiempos Headline/test-tiempos-headline-medium.woff2') format('woff2');
      font-weight: 500; font-style: normal;
    }

    /* ── Design tokens ──────────────────────────────────────────────────── */
    :root {
      --bg-sidebar: #141413;
      --bg-main:    #f5f4ef;
      --bg-card:    #ffffff;
      --bg-input:   #ededea;
      --bg-human:   #f0efea;
      --text-100:   #1c1917;
      --text-300:   #6b6860;
      --text-400:   #9b9892;
      --text-500:   #b5b2ab;
      --accent:     #c15f3c;
      --border:     #e4e2dc;
      --border-md:  #d1cec8;
      --blue:       #4f9ee8;
      --blue-bg:    rgba(79,158,232,.12);
      --blue-badge: rgba(79,158,232,.16);
      --dot-color:  #cac7c0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
      background: var(--bg-main);
      color: var(--text-100);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── App shell ──────────────────────────────────────────────────────── */
    .app { display: flex; height: 100vh; }

    /* ── Sidebar ────────────────────────────────────────────────────────── */
    .sidebar {
      width: 48px;
      background: var(--bg-sidebar);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0 12px;
      flex-shrink: 0;
      z-index: 40;
    }
    .sb-top  { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }
    .sb-btm  { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .sb-btn  {
      width: 36px; height: 36px;
      border-radius: 8px; border: none;
      background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,.38);
      transition: background 120ms, color 120ms;
    }
    .sb-btn:hover  { background: rgba(255,255,255,.07); color: rgba(255,255,255,.7); }
    .sb-btn.active { color: rgba(255,255,255,.82); }
    .sb-divider { width: 20px; height: 1px; background: rgba(255,255,255,.07); margin: 4px 0; }
    .user-av {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600; color: white;
      cursor: pointer; letter-spacing: .02em;
    }

    /* ── Main wrap ──────────────────────────────────────────────────────── */
    .main-wrap { flex: 1; position: relative; overflow: hidden; }

    /* ═══════════════════════════════════════════════════════════════════════
       HOME SCREEN
       ═══════════════════════════════════════════════════════════════════════ */
    #home-screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg-main);
      transition: opacity 260ms ease, transform 260ms ease;
    }
    #home-screen.hiding {
      opacity: 0; transform: translateY(-10px); pointer-events: none;
    }

    .greeting-row {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 26px;
    }
    .greeting-logo { width: 40px; height: 40px; color: var(--accent); flex-shrink: 0; }
    .greeting-text {
      font-family: 'Tiempos Headline', Georgia, serif;
      font-size: 34px; font-weight: 300;
      color: var(--text-100);
    }

    /* Home input container */
    .home-input-wrap {
      width: 600px; max-width: calc(100vw - 80px);
      background: var(--bg-card);
      border-radius: 16px;
      padding: 16px 16px 12px;
      box-shadow: 0 0 0 1px var(--border), 0 2px 8px rgba(0,0,0,.04);
    }
    .home-input-wrap:focus-within {
      box-shadow: 0 0 0 1.5px rgba(0,0,0,.14), 0 2px 10px rgba(0,0,0,.06);
    }
    .home-field {
      width: 100%; border: none; background: transparent;
      font-size: 15px; font-family: inherit; color: var(--text-100);
      resize: none; outline: none; line-height: 1.55;
      min-height: 24px; max-height: 160px;
      margin-bottom: 12px;
    }
    .home-field::placeholder { color: var(--text-400); }

    /* Toolbar row */
    .input-tb { display: flex; align-items: center; justify-content: space-between; }
    .tb-left  { display: flex; align-items: center; gap: 5px; }
    .tb-right { display: flex; align-items: center; gap: 6px; }

    /* Plus circle button */
    .plus-circle-btn {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1.5px solid var(--border-md);
      background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-400);
      transition: border-color 100ms, background 100ms, color 100ms;
    }
    .plus-circle-btn:hover { border-color: var(--text-400); color: var(--text-300); background: rgba(0,0,0,.04); }

    /* Iterate indicator (pencil-ruler icon, shown when iterate mode on) */
    #iterate-indicator {
      display: none; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 7px;
      color: var(--blue); background: var(--blue-badge);
    }
    #iterate-indicator.on { display: flex; }

    /* Model selector */
    .model-btn {
      display: flex; align-items: center; gap: 4px;
      padding: 4px 8px; border-radius: 7px; border: none;
      background: transparent; cursor: pointer; font-family: inherit;
      font-size: 13px; color: var(--text-400);
      transition: background 100ms, color 100ms;
    }
    .model-btn:hover { background: rgba(0,0,0,.06); color: var(--text-300); }

    /* Voice / send */
    .voice-btn {
      width: 30px; height: 30px; border-radius: 50%;
      border: 1px solid var(--border); background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-400); transition: background 100ms;
    }
    .voice-btn:hover { background: rgba(0,0,0,.06); }
    .send-btn {
      width: 30px; height: 30px; border-radius: 50%;
      border: none; background: var(--text-100); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: white; transition: background 100ms, transform 80ms, opacity 150ms;
    }
    .send-btn:hover:not(:disabled) { background: #333; }
    .send-btn:active:not(:disabled) { transform: scale(.91); }
    .send-btn:disabled { background: #c4c1ba; cursor: not-allowed; opacity: .7; }

    .home-disclaimer {
      margin-top: 10px; font-size: 11.5px; color: var(--text-500); text-align: center;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       + DROPDOWN MENU
       ═══════════════════════════════════════════════════════════════════════ */
    #plus-menu {
      position: fixed; z-index: 200;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,.1), 0 2px 6px rgba(0,0,0,.06);
      padding: 5px;
      width: 220px;
      opacity: 0; pointer-events: none;
      transform: translateY(-6px) scale(.97);
      transform-origin: top left;
      transition: opacity 140ms ease, transform 140ms ease;
    }
    #plus-menu.open {
      opacity: 1; pointer-events: auto; transform: none;
    }
    .menu-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 8px;
      cursor: pointer; font-size: 13.5px; color: var(--text-100);
      transition: background 80ms;
    }
    .menu-item:hover { background: var(--bg-main); }
    .menu-icon { width: 16px; height: 16px; color: var(--text-400); flex-shrink: 0; }
    .menu-item.iterate-item .menu-icon { color: var(--accent); }
    .menu-item.iterate-item.active-item { background: rgba(193,95,60,.06); }
    .menu-item.iterate-item.active-item .menu-label { color: var(--accent); font-weight: 500; }
    .menu-sep { height: 1px; background: var(--border); margin: 4px 0; }

    /* ═══════════════════════════════════════════════════════════════════════
       ITERATE SCREEN
       ═══════════════════════════════════════════════════════════════════════ */
    #iterate-screen {
      position: absolute; inset: 0;
      display: flex;
      opacity: 0; pointer-events: none;
      transition: opacity 300ms ease;
    }
    #iterate-screen.visible { opacity: 1; pointer-events: auto; }

    /* ── Canvas pane (left ~62%) ─────────────────────────────────────────── */
    #canvas-pane {
      flex: 1; min-width: 0;
      background: var(--bg-main);
      background-image: radial-gradient(circle, var(--dot-color) 1.2px, transparent 1.2px);
      background-size: 22px 22px;
      position: relative; overflow: hidden;
      cursor: default;
    }

    /* ── Resize handle between canvas and chat ───────────────────────────── */
    #pane-resizer {
      flex-shrink: 0;
      width: 5px;
      background: transparent;
      cursor: col-resize;
      position: relative;
      z-index: 30;
      transition: background 120ms;
    }
    #pane-resizer::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: 2px; width: 1px;
      background: var(--border);
      transition: background 120ms, width 120ms, left 120ms;
    }
    #pane-resizer:hover::after,
    #pane-resizer.resizing::after {
      left: 1px; width: 3px;
      background: var(--blue);
    }

    /* The infinite pannable/zoomable world */
    #canvas-world {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
      will-change: transform;
      padding: 40px 40px 120px;
    }

    /* Free-form canvas layout — blocks are absolutely positioned inside */
    #canvas-layout {
      position: relative;
      min-width: 900px; min-height: 700px;
    }

    /* Block widths for free-form layout */
    .ver-block  { width: 520px; }
    .sticky-blk { width: 290px; }
    .file-blk   { width: 290px; }

    /* Drag affordance */
    .block-drag-area { cursor: grab; }
    .block-drag-area:active { cursor: grabbing; }
    .block.is-dragging {
      box-shadow: 0 12px 32px rgba(0,0,0,.14), 0 0 0 1.5px rgba(0,0,0,.08);
      z-index: 20;
      cursor: grabbing !important;
    }

    /* ── Unified bottom bar (zoom + canvas tools) ───────────────────────── */
    #canvas-bar {
      position: absolute; bottom: 16px; left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 1px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 4px;
      box-shadow: 0 1px 5px rgba(0,0,0,.07);
      z-index: 10; user-select: none; white-space: nowrap;
    }
    .cbar-btn {
      width: 30px; height: 30px; border-radius: 7px;
      border: none; background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-400);
      transition: background 90ms, color 90ms;
    }
    .cbar-btn:hover { background: var(--bg-main); color: var(--text-100); }
    .cbar-pct {
      min-width: 44px; height: 30px; padding: 0 4px;
      border: none; background: transparent; cursor: pointer; font-family: inherit;
      font-size: 12px; font-weight: 500; color: var(--text-400);
      border-radius: 7px; transition: background 90ms, color 90ms;
    }
    .cbar-pct:hover { background: var(--bg-main); color: var(--text-300); }
    .cbar-sep {
      width: 1px; height: 18px; background: var(--border); margin: 0 3px; flex-shrink: 0;
    }

    /* ── Inline selection toolbar ────────────────────────────────────────── */
    #inline-sel-tb {
      position: fixed; z-index: 400;
      display: flex; align-items: center; gap: 2px;
      background: var(--bg-sidebar);
      border-radius: 9px; padding: 3px;
      box-shadow: 0 4px 16px rgba(0,0,0,.18), 0 1px 4px rgba(0,0,0,.12);
      opacity: 0; pointer-events: none;
      transform: translateY(4px);
      transition: opacity 140ms ease, transform 140ms ease;
    }
    #inline-sel-tb.show {
      opacity: 1; pointer-events: auto; transform: none;
    }
    .ist-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-radius: 6px; border: none;
      background: transparent; cursor: pointer; font-family: inherit;
      font-size: 12.5px; font-weight: 500; color: rgba(255,255,255,.7);
      transition: background 80ms, color 80ms;
    }
    .ist-btn:hover { background: rgba(255,255,255,.1); color: white; }
    .ist-sep { width: 1px; height: 14px; background: rgba(255,255,255,.12); margin: 0 1px; }

    /* ── Inline prompt card ──────────────────────────────────────────────── */
    #inline-prompt-card {
      position: fixed; z-index: 401;
      width: 360px;
      background: white;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.06);
      opacity: 0; pointer-events: none;
      transform: translateY(6px) scale(.98);
      transition: opacity 160ms ease, transform 160ms ease;
    }
    #inline-prompt-card.show {
      opacity: 1; pointer-events: auto; transform: none;
    }
    #ipc-field {
      width: 100%; border: none; background: transparent; outline: none;
      font-size: 14px; font-family: inherit; color: var(--text-100);
      resize: none; line-height: 1.55; min-height: 22px; max-height: 100px;
      margin-bottom: 10px;
    }
    #ipc-field::placeholder { color: var(--text-400); }
    .ipc-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    #ipc-plus {
      width: 30px; height: 30px; border-radius: 50%;
      border: 1.5px solid var(--border-md); background: white;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-400); transition: border-color 100ms, background 100ms;
    }
    #ipc-plus:hover { border-color: var(--text-400); background: rgba(0,0,0,.03); }
    #ipc-send {
      width: 30px; height: 30px; border-radius: 50%;
      border: none; background: var(--accent); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: white; transition: background 100ms, transform 80ms;
    }
    #ipc-send:hover { background: #a84e2e; }
    #ipc-send:active { transform: scale(.9); }

    /* Inline skeleton (full-width, 5-line placeholder) */
    .inline-skel { margin: 4px 0; }
    .inline-skel .skel { height: 20px; margin-bottom: 11px; }
    .inline-skel .skel:last-child { width: 72% !important; }

    /* ── Right-click context menu ────────────────────────────────────────── */
    #ctx-menu {
      position: fixed; z-index: 500;
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px; padding: 4px;
      min-width: 148px;
      box-shadow: 0 4px 16px rgba(0,0,0,.1), 0 1px 4px rgba(0,0,0,.06);
      opacity: 0; pointer-events: none;
      transform: scale(.96); transform-origin: top left;
      transition: opacity 120ms ease, transform 120ms ease;
    }
    #ctx-menu.show {
      opacity: 1; pointer-events: auto; transform: none;
    }
    #ctx-delete {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 10px; border-radius: 7px;
      color: #d84040; cursor: pointer; font-size: 13.5px;
      transition: background 80ms;
    }
    #ctx-delete:hover { background: #fff2f2; }

    /* ── Blocks ─────────────────────────────────────────────────────────── */
    .block {
      position: relative;
      background: var(--bg-card);
      border-radius: 12px;
      border: 2px solid transparent;
      box-shadow: 0 1px 4px rgba(0,0,0,.07), 0 0 0 1px rgba(0,0,0,.04);
      overflow: hidden;
      transition: border-color 160ms, box-shadow 160ms;
    }
    .block.selected {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(79,158,232,.1), 0 1px 4px rgba(0,0,0,.07);
    }

    /* Checkbox (top-left hover-reveal) */
    .blk-check {
      position: absolute; top: 10px; left: 10px;
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 130ms;
      background: transparent; border: none; cursor: pointer; padding: 0;
      color: var(--text-500); z-index: 10;
      border-radius: 4px;
    }
    .blk-check.peek   { opacity: 1; }
    .block.selected .blk-check { opacity: 1; color: var(--blue); }

    /* Block inner — padding shifts down when selected */
    .blk-inner {
      padding: 20px;
      transition: padding-top 160ms;
    }
    .block.selected .blk-inner { padding-top: 38px; }

    /* ── Version block ──────────────────────────────────────────────────── */
    .ver-block .blk-inner { padding: 22px 24px 24px; }
    .ver-block.selected .blk-inner { padding-top: 40px; }

    .ver-label {
      font-size: 12.5px; font-weight: 600; color: var(--text-400);
      letter-spacing: .02em; margin-bottom: 14px;
    }
    .ver-body {
      font-family: 'Tiempos Headline', Georgia, serif;
      font-size: 14.5px; font-weight: 400; line-height: 1.78;
      color: var(--text-100);
      outline: none;
      border-radius: 4px;
    }
    .ver-body p + p { margin-top: 12px; }
    .ver-body[contenteditable="true"] { cursor: text; }
    .ver-body[contenteditable="true"]:focus {
      box-shadow: 0 0 0 2px rgba(79,158,232,.22);
    }

    /* ── Sticky note block ──────────────────────────────────────────────── */
    .block.sticky-blk {
      background: #fffef5;
      border-color: #e3d98a;
      box-shadow: 0 1px 4px rgba(0,0,0,.06), 0 0 0 1px rgba(0,0,0,.03);
    }
    .block.sticky-blk.selected { border-color: var(--blue); }
    .sticky-blk .blk-inner { padding: 14px 16px; }
    .sticky-blk.selected .blk-inner { padding-top: 32px; }

    .sticky-hd {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .08em; color: #b09d30; margin-bottom: 8px;
    }
    .sticky-ta {
      width: 100%; border: none; background: transparent; outline: none;
      font-size: 13.5px; font-family: 'Tiempos Headline', Georgia, serif;
      color: var(--text-100); line-height: 1.65;
      resize: none; min-height: 72px; max-height: 220px;
    }
    .sticky-ta::placeholder { color: #c4ba6a; font-style: italic; }

    /* ── File block ─────────────────────────────────────────────────────── */
    .file-blk .blk-inner {
      padding: 12px 16px; display: flex; align-items: center; gap: 12px;
    }
    .file-blk.selected .blk-inner { padding-top: 30px; }
    .file-ic {
      width: 38px; height: 38px; border-radius: 8px;
      background: #f0efea; display: flex; align-items: center; justify-content: center;
      color: var(--text-400); flex-shrink: 0;
    }
    .file-meta-wrap { flex: 1; min-width: 0; }
    .file-name {
      font-size: 13px; font-weight: 500; color: var(--text-100);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-type { font-size: 11.5px; color: var(--text-400); margin-top: 1px; }

    /* ── Skeleton lines ─────────────────────────────────────────────────── */
    .skel {
      height: 14px; border-radius: 5px; margin-bottom: 10px;
      background: linear-gradient(90deg,#eeede8 25%,#e5e3de 50%,#eeede8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.3s ease infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* Stream cursor */
    .scursor {
      display: inline-block; width: 2px; height: 13px;
      background: var(--text-400); border-radius: 1px;
      vertical-align: text-bottom; margin-left: 1px;
      animation: blink .85s ease infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ═══════════════════════════════════════════════════════════════════════
       CHAT PANE (right ~38%)
       ═══════════════════════════════════════════════════════════════════════ */
    #chat-pane {
      flex: 0 0 auto;
      width: 420px;        /* default width — JS will override via style.width */
      min-width: 360px;
      max-width: 720px;
      display: flex; flex-direction: column;
      background: white;
      overflow: hidden;
    }

    /* Topbar */
    #chat-topbar {
      height: 48px; flex-shrink: 0;
      display: flex; align-items: center;
      padding: 0 18px;
      border-bottom: 1px solid var(--border);
    }
    .topbar-title {
      display: flex; align-items: center; gap: 5px;
      font-size: 14px; font-weight: 500; color: var(--text-100);
      background: transparent; border: none; cursor: pointer;
      font-family: inherit; border-radius: 6px;
      padding: 4px 7px; margin: 0 -7px;
      transition: background 100ms;
    }
    .topbar-title:hover { background: rgba(0,0,0,.05); }

    /* Messages */
    #msgs-wrap {
      flex: 1; overflow-y: auto;
      padding: 24px 20px;
      scroll-behavior: smooth;
    }
    #msgs-wrap::-webkit-scrollbar { width: 5px; }
    #msgs-wrap::-webkit-scrollbar-thumb { background: rgba(0,0,0,.09); border-radius: 3px; }
    #msgs-inner { display: flex; flex-direction: column; gap: 22px; }

    /* Human message */
    .msg-human { display: flex; flex-direction: column; align-items: flex-end; }
    .human-bub {
      background: var(--bg-human);
      border-radius: 16px 16px 3px 16px;
      padding: 10px 14px;
      font-size: 14px; line-height: 1.55;
      color: var(--text-100); max-width: 90%; word-break: break-word;
    }

    /* Human message with selection context */
    .ctx-bub {
      background: var(--bg-human);
      border-radius: 16px 16px 3px 16px;
      padding: 12px 14px;
      max-width: 90%;
      display: flex; flex-direction: column; gap: 8px;
    }
    .ctx-pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--blue-badge); color: #2873b5;

// ── State ──────────────────────────────────────────────────────────────────

// Free-form canvas layout tracking

const SIDE_X     = 552;       // x offset for sticky/file blocks
const VER_GAP    = 20;

// ── Cover-letter content ───────────────────────────────────────────────────
const V1 = `<p>Dear Hiring Team,</p>

// ── Make a block selectable (checkbox hover + toggle) ─────────────────────
function makeSelectable(blockEl) {
  const checkBtn = blockEl.querySelector('.blk-check');

  // Reveal checkbox when cursor enters the top-left 70×60px zone
  blockEl.addEventListener('mousemove', e => {
    const r = blockEl.getBoundingClientRect();
    const x = e.clientX - r.left;
    const y = e.clientY - r.top;
    if (x < 72 && y < 62) {
      checkBtn.classList.add('peek');
    } else if (!blockEl.classList.contains('selected')) {
      checkBtn.classList.remove('peek');
    }
  });
  blockEl.addEventListener('mouseleave', () => {
    if (!blockEl.classList.contains('selected')) checkBtn.classList.remove('peek');
  });

  // Toggle selection on checkbox click
  checkBtn.addEventListener('click', e => {
    e.stopPropagation();
    const id = blockEl.id;
    if (blockEl.classList.contains('selected')) {
      blockEl.classList.remove('selected');
      checkBtn.innerHTML = svgCheckEmpty();
      selectedIds.delete(id);
    } else {
      blockEl.classList.add('selected');
      checkBtn.innerHTML = svgCheckFilled();
      selectedIds.add(id);
    }
    updateSelBadge();
  });
}

// ── Free-form block dragging ───────────────────────────────────────────────
let dragBlock = null, dragStartLeft = 0, dragStartTop = 0;
let dragStartMouseX = 0, dragStartMouseY = 0;

function makeDraggable(blockEl) {
  blockEl.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    // Skip drag when clicking interactive children
    if (e.target.closest('textarea, [contenteditable="true"], button, input, a')) return;
    e.stopPropagation(); // prevent canvas pan
    e.preventDefault();

    dragBlock      = blockEl;
    dragStartLeft  = parseFloat(blockEl.style.left) || 0;
    dragStartTop   = parseFloat(blockEl.style.top)  || 0;
    dragStartMouseX = e.clientX;
    dragStartMouseY = e.clientY;

    blockEl.classList.add('is-dragging');
    // Bring to front
    blockEl.style.zIndex = '30';
  });
}

document.addEventListener('mousemove', e => {
  if (!dragBlock) return;
  const dx = (e.clientX - dragStartMouseX) / camScale;
  const dy = (e.clientY - dragStartMouseY) / camScale;
  dragBlock.style.left = (dragStartLeft + dx) + 'px';
  dragBlock.style.top  = (dragStartTop  + dy) + 'px';
});

document.addEventListener('mouseup', () => {
  if (!dragBlock) return;
  dragBlock.classList.remove('is-dragging');
  dragBlock.style.zIndex = '';
  dragBlock = null;
});

const paneResizer = document.getElementById('pane-resizer');
const chatPane    = document.getElementById('chat-pane');
const CHAT_MIN    = 360;
const CHAT_MAX    = 720;

let isResizing = false, resizeStartX = 0, resizeStartW = 0;

paneResizer.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  isResizing    = true;

  resizeStartW  = chatPane.offsetWidth;

  document.body.style.userSelect = 'none';

});

  if (!isResizing) return;
  // Dragging right → chat gets narrower; left → wider
  const delta  = resizeStartX - e.clientX;
  const newW   = Math.min(CHAT_MAX, Math.max(CHAT_MIN, resizeStartW + delta));
  chatPane.style.width = newW + 'px';
});

document.addEventListener('mouseup', () => {

  isResizing = false;

// ── Canvas pan / zoom ──────────────────────────────────────────────────────
let camX = 40, camY = 40, camScale = 1;
const CAM_MIN = 0.1, CAM_MAX = 3;
let spaceDown = false, isPanning = false, panOrigin = null;

function applyTransform(animated) {
  canvasWorld.style.transition = animated
    ? 'transform 320ms cubic-bezier(.22,.68,0,1.2)'
    : 'none';
  canvasWorld.style.transform = `translate(${camX}px,${camY}px) scale(${camScale})`;
  document.getElementById('zoom-reset').textContent = Math.round(camScale * 100) + '%';
}

// Initialise transform once the iterate screen is visible
function initCanvas() {
  camX = 40; camY = 40; camScale = 1;
  applyTransform(false);
}

// Zoom centred on the cursor (or pane centre for buttons)
function zoomAt(cx, cy, factor) {
  const newScale = Math.min(CAM_MAX, Math.max(CAM_MIN, camScale * factor));
  const worldX = (cx - camX) / camScale;
  const worldY = (cy - camY) / camScale;
  camX = cx - worldX * newScale;
  camY = cy - worldY * newScale;
  camScale = newScale;
}

// Wheel → zoom
canvasPane.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvasPane.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  // Trackpad pinch uses ctrlKey; regular wheel uses smaller steps
  const factor = e.ctrlKey
    ? (e.deltaY < 0 ? 1.12 : 1 / 1.12)
    : (e.deltaY < 0 ? 1.07 : 1 / 1.07);
  zoomAt(cx, cy, factor);
  applyTransform(false);
}, { passive: false });

// Space → grab cursor (non-destructive: don't capture in text inputs)
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.target.matches('textarea,input,[contenteditable]')) {
    if (!spaceDown) { spaceDown = true; canvasPane.style.cursor = 'grab'; }
    e.preventDefault();
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') {
    spaceDown = false;
    if (!isPanning) canvasPane.style.cursor = '';
  }
});

// Mousedown → start pan (middle button OR space + left button)
canvasPane.addEventListener('mousedown', e => {
  if (e.button === 1 || (e.button === 0 && spaceDown)) {
    isPanning = true;
    panOrigin = { x: e.clientX - camX, y: e.clientY - camY };
    canvasPane.style.cursor = 'grabbing';
    e.preventDefault();
  }
});
document.addEventListener('mousemove', e => {
  if (!isPanning) return;
  camX = e.clientX - panOrigin.x;
  camY = e.clientY - panOrigin.y;
  applyTransform(false);
});
document.addEventListener('mouseup', () => {
  if (isPanning) {
    isPanning = false;
    canvasPane.style.cursor = spaceDown ? 'grab' : '';
  }
});

// Zoom HUD buttons
document.getElementById('zoom-in').addEventListener('click', () => {
  zoomAt(canvasPane.clientWidth / 2, canvasPane.clientHeight / 2, 1.25);
  applyTransform(true);
});
document.getElementById('zoom-out').addEventListener('click', () => {
  zoomAt(canvasPane.clientWidth / 2, canvasPane.clientHeight / 2, 1 / 1.25);
  applyTransform(true);
});
document.getElementById('zoom-reset').addEventListener('click', () => {
  camX = 40; camY = 40; camScale = 1;
  applyTransform(true);
});

// Pan camera so the latest version block stays in view
function autoPanToLatest() {
  requestAnimationFrame(() => {
    const lastBlock = lastVersionBlock;
    if (!lastBlock) return;
    const blockRect = lastBlock.getBoundingClientRect();
    const paneRect  = canvasPane.getBoundingClientRect();
    const margin    = 60;
    // If bottom of block is below the visible pane, slide up
    const overflow  = (blockRect.bottom - paneRect.top) - paneRect.height + margin;
    if (overflow > 0) {
      const startY = camY;
      const endY   = camY - overflow;
      const dur    = 380, t0 = performance.now();
      function step(now) {
        const p    = Math.min((now - t0) / dur, 1);
        const ease = 1 - Math.pow(1 - p, 3);
        camY = startY + (endY - startY) * ease;
        applyTransform(false);
        if (p < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }
  });
}

// ── Streaming helpers ──────────────────────────────────────────────────────
// Stream HTML content (with <p> tags) word-by-word into a container
function streamInto(container, cursor, html, onDone) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  const paras  = Array.from(tmp.querySelectorAll('p'));
  const chunks = [];

  if (paras.length > 0) {
    paras.forEach((p, i) => {
      if (i > 0) chunks.push(null); // paragraph break
      p.innerHTML.split(/(\s+)/).forEach(w => { if (w) chunks.push(w); });
    });
  } else {
    html.split(/(\s+)/).forEach(w => { if (w) chunks.push(w); });
  }

  let idx = 0, curP = null;

  function next() {
    if (idx >= chunks.length) { cursor.remove(); if (onDone) onDone(); return; }
    const ch = chunks[idx++];
    if (ch === null) { curP = null; setTimeout(next, 48); return; }
    if (!curP) {
      curP = document.createElement('p');
      container.insertBefore(curP, cursor); // cursor is always a direct child
    }
    const s = document.createElement('span');
    s.innerHTML = ch;
    curP.appendChild(s);
    scrollMsgs();
    setTimeout(next, 8 + Math.random() * 14);
  }
  next();
}

// Stream plain-text words
function streamWords(el, cursor, text, onDone) {
  const words = text.split(/(\s+)/);
  let i = 0;
  function next() {
    if (i >= words.length) { cursor.remove(); if (onDone) onDone(); return; }
    const s = document.createElement('span');
    s.textContent = words[i++];
    el.insertBefore(s, cursor);
    scrollMsgs();
    setTimeout(next, 18 + Math.random() * 22);
  }
  next();
}

// ── Canvas toolbar buttons ─────────────────────────────────────────────────
document.getElementById('btn-note').addEventListener('click', addStickyNote);
document.getElementById('btn-attach').addEventListener('click', addFileBlock);

// ── Inline selection toolbar ───────────────────────────────────────────────
const inlineSelTb    = document.getElementById('inline-sel-tb');
const inlinePromptCard = document.getElementById('inline-prompt-card');
const ipcField       = document.getElementById('ipc-field');

let selTarget        = null; // the <p> element the user selected text in
let selRangeRect     = null; // the bounding rect of the selection

function showInlineSelTb(rect) {
  // Centre toolbar above the selection
  const tbW = 148;
  let left = rect.left + (rect.width - tbW) / 2;
  let top  = rect.top - 42;
  // clamp
  left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8));
  if (top < 8) top = rect.bottom + 6;
  inlineSelTb.style.left = left + 'px';
  inlineSelTb.style.top  = top  + 'px';
  inlineSelTb.classList.add('show');
}

function hideInlineSelTb() {
  inlineSelTb.classList.remove('show');
}

function showInlinePromptCard(rect) {
  const cardW = 360;
  let left = rect.left;
  let top  = rect.bottom + 10;
  left = Math.max(8, Math.min(left, window.innerWidth - cardW - 8));
  if (top + 120 > window.innerHeight) top = rect.top - 130;
  inlinePromptCard.style.left = left + 'px';
  inlinePromptCard.style.top  = top  + 'px';
  inlinePromptCard.classList.add('show');
  setTimeout(() => ipcField.focus(), 80);
}

function hideInlinePromptCard() {
  inlinePromptCard.classList.remove('show');
  ipcField.value = '';
}

// Detect text selection within .ver-body
document.addEventListener('mouseup', e => {
  // Small delay so the browser has committed the selection
  setTimeout(() => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) return;

    // Walk up to find .ver-body ancestor
    let node = sel.anchorNode;
    let verBody = null;
    while (node) {
      if (node.nodeType === 1 && node.classList && node.classList.contains('ver-body')) {
        verBody = node; break;
      }
      node = node.parentNode;
    }
    if (!verBody) return;

    // Find the paragraph the selection starts in
    let pEl = sel.anchorNode;
    while (pEl && pEl.tagName !== 'P') pEl = pEl.parentNode;
    selTarget = (pEl && verBody.contains(pEl)) ? pEl : null;

    const range = sel.getRangeAt(0);
    selRangeRect = range.getBoundingClientRect();
    showInlineSelTb(selRangeRect);
  }, 10);
});

// Dismiss toolbar when clicking outside
document.addEventListener('mousedown', e => {
  setTimeout(() => {
    if (!inlineSelTb.contains(e.target) && !inlinePromptCard.contains(e.target)) {
      hideInlineSelTb();
    }
  }, 20);
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { hideInlineSelTb(); hideInlinePromptCard(); }
});

// Reply: paste selected text into chat field
document.getElementById('ist-reply').addEventListener('click', () => {
  const sel = window.getSelection();
  if (sel && !sel.isCollapsed) {
    const text = sel.toString().trim();
    if (text) {
      chatField.value = '\u201c' + text + '\u201d ';
      chatField.dispatchEvent(new Event('input'));
      chatField.focus();
    }
  }
  hideInlineSelTb();
  window.getSelection()?.removeAllRanges();
});

// Ask: open inline prompt card
document.getElementById('ist-ask').addEventListener('click', () => {
  hideInlineSelTb();
  if (selRangeRect) showInlinePromptCard(selRangeRect);
  window.getSelection()?.removeAllRanges();
});

// Submit inline prompt (Enter or send button)
ipcField.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitInlinePrompt(); }
});
document.getElementById('ipc-send').addEventListener('click', submitInlinePrompt);

function submitInlinePrompt() {
  const prompt = ipcField.value.trim();
  if (!prompt || !selTarget) return;

  hideInlinePromptCard();

  // a) Replace target <p> with 5 skeleton lines
  const skelDiv = document.createElement('div');
  skelDiv.className = 'inline-skel';
  for (let i = 0; i < 5; i++) {
    const w = 68 + Math.floor(Math.random() * 28);
    skelDiv.innerHTML += `<div class="skel" style="width:${w}%"></div>`;
  }
  selTarget.replaceWith(skelDiv);

  // b) Add chat messages
  addHumanMsg(prompt);
  addClaudeMsg('Working on it\u2026', null);

  // c) After ~1200ms: replace skeleton with streamed paragraph
  const replacementText = 'I have revised this paragraph to better highlight your experience with high-velocity trading systems at Groww, directly connecting it to the kind of real-time AI interface design challenges Anthropic faces. The tone is more specific and confident, grounding your enthusiasm in concrete past results.';

  setTimeout(() => {
    const newP = document.createElement('p');
    skelDiv.replaceWith(newP);
    const cursor = document.createElement('span');
    cursor.className = 'scursor';
    newP.appendChild(cursor);
    streamWords(newP, cursor, replacementText, () => {
      // d) Follow-up Claude message in chat
      addClaudeMsg('I\u2019ve updated that paragraph in place. Let me know if you\u2019d like further refinements.', null);
    });
  }, 1200);

  selTarget = null;
  selRangeRect = null;
}

// ── Right-click context menu ───────────────────────────────────────────────
const ctxMenu = document.getElementById('ctx-menu');
let ctxTargetBlock = null;

canvasWorld.addEventListener('contextmenu', e => {
  const block = e.target.closest('.block');
  if (!block) return;
  e.preventDefault();
  ctxTargetBlock = block;

  let left = e.clientX;
  let top  = e.clientY;
  const menuW = 148, menuH = 52;
  if (left + menuW > window.innerWidth  - 8) left = window.innerWidth  - menuW - 8;
  if (top  + menuH > window.innerHeight - 8) top  = window.innerHeight - menuH - 8;
  ctxMenu.style.left = left + 'px';
  ctxMenu.style.top  = top  + 'px';
  ctxMenu.classList.add('show');
});

document.getElementById('ctx-delete').addEventListener('click', () => {
  if (!ctxTargetBlock) return;
  const id = ctxTargetBlock.id;

  // Animate out
  ctxTargetBlock.style.transition = 'opacity 180ms ease, transform 180ms ease';
  ctxTargetBlock.style.opacity    = '0';
  ctxTargetBlock.style.transform  = 'scale(0.93)';

  setTimeout(() => {
    if (ctxTargetBlock && ctxTargetBlock.parentNode) {
      ctxTargetBlock.parentNode.removeChild(ctxTargetBlock);
    }
    // Remove from selection state if it was selected
    if (selectedIds.has(id)) {
      selectedIds.delete(id);
      updateSelBadge();
    }
    ctxTargetBlock = null;
  }, 200);

  hideCtxMenu();
});

function hideCtxMenu() {
  ctxMenu.classList.remove('show');
}

// Dismiss context menu
document.addEventListener('click', e => {
  if (!ctxMenu.contains(e.target)) hideCtxMenu();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') hideCtxMenu();
});

// ── Escape HTML ────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
